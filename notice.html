<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 공지사항</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; min-height: 100%; background: #f0ede8; font-family: 'Noto Sans KR', sans-serif; color: #111; }

        .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 9999; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); }
        .header-logo { height: 44px; display: flex; align-items: center; }
        .header-logo img { height: 44px; width: auto; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
        .menu-btn span { display: block; width: 30px; height: 2px; background: white; border-radius: 2px; }

        .side-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99998; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .side-overlay.open { opacity: 1; pointer-events: all; }
        .side-menu { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: rgba(10,10,10,0.97); backdrop-filter: blur(20px); z-index: 99999; transition: right 0.4s cubic-bezier(0.16,1,0.3,1); display: flex; flex-direction: column; padding: 100px 50px 50px; }
        .side-menu.open { right: 0; }
        .side-nav-item a, .side-nav-item .nav-label { display: block; color: white; text-decoration: none; font-size: 26px; font-weight: 400; padding: 16px 0; cursor: pointer; transition: color 0.2s; }
        .side-nav-item a:hover { color: rgba(255,255,255,0.5); }
        .nav-sub { display: none; flex-direction: column; gap: 4px; padding: 0 0 14px 12px; }
        .side-nav-item:hover .nav-sub { display: flex; }
        .nav-sub a { font-size: 17px; color: rgba(255,255,255,0.6); padding: 5px 0; text-decoration: none; display: block; }
        .nav-sub a:hover { color: white; }
        @media (max-width: 700px) { .side-menu { width: 65%; right: -65%; } .nav-sub { display: none !important; } }

        .content { padding: 120px 0 100px; width: 100%; }
        .content-inner { max-width: 1300px; margin: 0 auto; padding: 0 40px; }

        .page-header { margin-bottom: 80px; padding: 0 40px; margin-top: -30px; }
        .page-title { font-size: clamp(52px, 10vw, 120px); font-weight: 400; line-height: 1; letter-spacing: -3px; text-align: left; }

        .glass {
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
        }

        .notice-card { padding: 36px 50px; margin-bottom: 16px; opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .notice-card.visible { opacity: 1; transform: translateY(0); }
        .notice-num { font-size: 13px; color: rgba(0,0,0,0.3); font-family: 'Space Mono', monospace; letter-spacing: 2px; margin-bottom: 10px; }
        .notice-title { font-size: clamp(24px, 3vw, 36px); font-weight: 700; letter-spacing: -1px; margin-bottom: 20px; }
        .notice-divider { border: none; border-top: 1px solid rgba(0,0,0,0.1); margin-bottom: 20px; }
        .notice-body { font-size: 16px; line-height: 1.5; color: #333; word-break: keep-all; overflow-wrap: break-word; }
        .notice-body p { margin-bottom: 0.8em; }
        .notice-body br { display: block; content: ''; margin-top: 0; }

        #loading { text-align: center; padding: 200px 20px; color: rgba(0,0,0,0.3); font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 2px; }

        @media (max-width: 700px) {
            .content { padding: 80px 0 60px; }
            .content-inner { padding: 0 16px; }
            .page-header { padding: 0 16px; margin-bottom: 30px; margin-top: 16px; }
            .page-title { font-size: clamp(32px, 9vw, 60px) !important; letter-spacing: -1px; }
            .notice-card { padding: 24px 20px; cursor: pointer; }
            .page-title { letter-spacing: -2px; font-size: clamp(40px, 12vw, 80px); }
        }
        .notice-card-body-wrap { position: relative; }
        .notice-card-body-wrap.collapsed .notice-body { max-height: 120px; overflow: hidden; }
        .notice-card-body-wrap.collapsed::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.9)); pointer-events: none; border-radius: 0 0 16px 16px; }
        .notice-view-btn { display: none; margin-top: 12px; background: none; border: 1px solid rgba(0,0,0,0.15); color: #333; padding: 8px 20px; font-size: 13px; cursor: pointer; border-radius: 20px; width: 100%; }
        @media (max-width: 700px) { .notice-view-btn { display: block; } }
    </style>
</head>
<body>
    <div class="side-overlay" id="overlay" onclick="closeSideMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <nav class="side-nav">
            <div class="side-nav-item"><a href="index.html">Home</a></div>
            <div class="side-nav-item">
                <div class="nav-label">입시결과</div>
                <div class="nav-sub" id="admission-nav"></div>
            </div>
            <div class="side-nav-item">
                <div class="nav-label">장학금</div>
                <div class="nav-sub" id="scholarship-nav"></div>
            </div>
            <div class="side-nav-item"><a href="notice.html">공지사항</a></div>
        </nav>
    </div>

    <header class="header-bar">
        <a href="index.html" class="header-logo">
            <img src="https://i.imgur.com/fgXI0Gf.png" alt="Logo">
        </a>
        <div class="menu-btn" onclick="toggleSideMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div class="content">
        <div id="loading">LOADING...</div>
        <div id="main-content" style="display:none;">
            <div class="page-header">
                <h1 class="page-title">공지사항</h1>
            </div>
            <div class="content-inner">
                <div id="notices-container"></div>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAr97vLewEWGy3igiJIdfh9gtweDemd2co",
        authDomain: "gvcs-admission.firebaseapp.com",
        projectId: "gvcs-admission",
        storageBucket: "gvcs-admission.firebasestorage.app",
        messagingSenderId: "744629757874",
        appId: "1:744629757874:web:23d91c55a14b1845d766ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function load() {
        try {
            const docSnap = await getDoc(doc(db, 'config', 'siteData'));
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            if (docSnap.exists()) {
                const data = docSnap.data();
                data.admissionYears?.forEach(y => {
                    const a = document.createElement('a');
                    a.href = `admission.html?year=${y.year}`;
                    a.textContent = String(y.year);
                    document.getElementById('admission-nav').appendChild(a);
                });
                data.scholarshipYears?.forEach(y => {
                    const b = document.createElement('a');
                    b.href = `scholarship.html?year=${y.year}`;
                    b.textContent = String(y.year);
                    document.getElementById('scholarship-nav').appendChild(b);
                });

                const notices = data.notices || [];
                window._noticesData = notices;
                const container = document.getElementById('notices-container');
                if (notices.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:80px 20px;color:rgba(0,0,0,0.3);font-family:Space Mono,monospace;font-size:13px;letter-spacing:2px;">공지사항이 없습니다.</div>';
                } else {
                    const isMobile = window.innerWidth <= 700;
                    notices.forEach((n, i) => {
                        const div = document.createElement('div');
                        div.className = 'glass notice-card';
                        div.innerHTML = `
                            <div class="notice-num">NOTICE ${String(i+1).padStart(2,'0')}</div>
                            <div class="notice-title">${n.title || ''}</div>
                            <hr class="notice-divider">
                            <div class="notice-card-body-wrap${isMobile ? ' collapsed' : ''}">
                                <div class="notice-body">${n.content || ''}</div>
                            </div>
                            <button class="notice-view-btn" onclick="openNoticeDetail(${i})">자세히 보기</button>`;
                        container.appendChild(div);
                    });

                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                entry.target.classList.add('visible');
                                observer.unobserve(entry.target);
                            }
                        });
                    }, { threshold: 0.1 });
                    document.querySelectorAll('.notice-card').forEach(el => {
                        observer.observe(el);
                        if (isMobile) {
                            const body = el.querySelector('.notice-body');
                            const wrap = el.querySelector('.notice-card-body-wrap');
                            const btn = el.querySelector('.notice-view-btn');
                            if (body && body.scrollHeight <= 120) {
                                wrap?.classList.remove('collapsed');
                                if (btn) btn.style.display = 'none';
                            }
                        }
                    });
                }
            }
        } catch(e) {
            document.getElementById('loading').textContent = 'ERROR';
        }
    }

    window.toggleSideMenu = function() {
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    };
    window.closeSideMenu = function() {
        document.getElementById('sideMenu').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
    };

    load();
    if (sessionStorage.getItem('adminMode') === '1') {
        const adminItem = document.createElement('div');
        adminItem.className = 'side-nav-item';
        adminItem.innerHTML = '<a href="index.html" style="color:rgba(255,200,0,0.8);">관리 콘솔</a>';
        document.querySelector('.side-nav').appendChild(adminItem);
    }
    window._noticesData = [];

    window.openNoticeDetail = function(i) {
        const notices = window._noticesData;
        const n = notices[i];
        if (!n) return;
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999990;';
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#f0ede8;z-index:999991;overflow-y:auto;padding:80px 20px 60px;';
        modal.innerHTML = `
            <button onclick="this.closest('[style*=\"999991\"]').remove();document.querySelector('[style*=\"999990\"]').remove();" style="position:fixed;top:16px;left:16px;background:none;border:none;font-size:24px;cursor:pointer;z-index:999992;">←</button>
            <div style="font-size:12px;color:rgba(0,0,0,0.3);letter-spacing:2px;margin-bottom:10px;font-family:Space Mono,monospace;">NOTICE ${String(i+1).padStart(2,'0')}</div>
            <div style="font-size:clamp(22px,6vw,32px);font-weight:700;letter-spacing:-1px;margin-bottom:20px;">${n.title || ''}</div>
            <hr style="border:none;border-top:1px solid rgba(0,0,0,0.1);margin-bottom:20px;">
            <div style="font-size:15px;line-height:1.8;color:#333;word-break:keep-all;">${n.content || ''}</div>`;
        document.body.appendChild(overlay);
        document.body.appendChild(modal);
        overlay.onclick = () => { overlay.remove(); modal.remove(); };
    };
    </script>
</body>
</html>
