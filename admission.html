<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 입시결과 2026</title>
    <style>
        :root { --gvcs-red: #9a1e23; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; min-height: 100%; background: #fff; font-family: 'Noto Sans KR', sans-serif; }

        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 9999;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
        }
        .header-logo { height: 50px; display: flex; align-items: center; }
        .header-logo img { height: 50px; width: auto; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
        .menu-btn span { display: block; width: 30px; height: 2px; background: white; border-radius: 2px; }

        .content { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 100px 20px 60px; }
        .admission-img { width: 100%; max-width: 1000px; height: auto; display: block; }
        .mobile-img { display: none; }
@media (max-width: 700px) { .pc-img { display: none; } .mobile-img { display: block; } }
        
    </style>
</head>
<body>
    <header class="header-bar">
        <a href="index.html" class="header-logo">
            <img src="https://i.imgur.com/fgXI0Gf.png" alt="Logo">
        </a>
        <div class="menu-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <div class="content">
        <img src="https://i.imgur.com/TPqPKxW.png" alt="GVCS 입시결과" class="admission-img pc-img">
<img src="https://i.imgur.com/0z1tARg.png" alt="GVCS 입시결과" class="admission-img mobile-img">
    </div>
</body>
</html>
