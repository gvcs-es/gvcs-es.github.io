<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 글로벌선진학교 음성캠퍼스</title>
    <style>
        :root { --gvcs-red: #9a1e23; --gvcs-blue: #1a3a6b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #000; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }

        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 9999;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
            transition: background 0.5s ease;
        }
        .header-bar.scrolled { height: 70px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); }

        .header-logo { height: 50px; display: flex; align-items: center; z-index: 10000; }
        .header-logo img { height: 50px; width: auto; }

        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 6px; z-index: 10000; }
        .menu-btn span { display: block; width: 30px; height: 2px; background: white; border-radius: 2px; }

        .main-wrapper { width: 100%; height: 100%; position: relative; }
        .page-section { width: 100%; height: 100vh; position: absolute; top: 0; left: 0; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform; }

        #section-hero { z-index: 1; background: url('https://i.imgur.com/BCMjATY.png') center/cover no-repeat; position: relative; }
        #section-results { z-index: 2; background: var(--gvcs-red); transform: translateY(100vh); color: white; }
        #section-results-2025 { z-index: 3; background: var(--gvcs-blue); transform: translateY(100vh); color: white; }

        .hero-text-container {
            position: absolute; bottom: 30px; left: 30px;
            display: flex; flex-direction: row; align-items: flex-end; gap: 15px;
        }
        .img-gvcs { height: 175px; width: auto; flex-shrink: 0; }
        .img-sub { height: 120px; width: auto; flex-shrink: 0; }

        .results-content { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 110px 40px 40px; }
        .results-title h1 { font-size: 160px; font-weight: 700; color: white; line-height: 1; }
        .results-title h2 { font-size: 160px; font-weight: 700; color: white; line-height: 1; }
        .results-btn { align-self: flex-end; border: 2px solid white; color: white; padding: 18px 40px; font-size: 18px; text-decoration: none; transition: all 0.3s ease; }
        .results-btn:hover { background: white; color: inherit; }

        .mobile-divider, .mobile-scroll-hint { display: none; }

        @media (max-width: 700px) {
            html, body { overflow: auto; height: auto; }
            .main-wrapper { height: auto; position: static; }
            .page-section { position: static; height: auto; transform: none !important; transition: none !important; }

            #section-hero {
                display: flex; flex-direction: column;
                justify-content: flex-start; align-items: flex-start;
                background: var(--gvcs-red);
                padding-top: 90px; padding-bottom: 40px;
                min-height: 100vh;
            }
            #section-hero::before {
                content: '';
                display: block;
                width: 90%;
                margin: 0 auto;
                aspect-ratio: 16 / 9;
                background: url('https://i.imgur.com/BCMjATY.png') center/cover no-repeat;
                flex-shrink: 0;
                border: 1.5px solid #000;
            }
            .hero-text-container {
                position: static; flex-direction: column; align-items: flex-start;
                gap: 16px; margin-top: 24px; padding-left: 5%;
            }
            .img-gvcs { height: 70px; }
            .img-sub { height: 50px; }

            .mobile-divider {
                display: block; width: 90%; margin: 24px auto 14px;
                border: none; border-top: 1.5px solid white;
            }
            .mobile-scroll-hint {
                display: block; width: 90%; margin: 0 auto;
                color: white; font-size: 13px;
            }

            .header-bar { background: rgba(0,0,0,0.7) !important; backdrop-filter: blur(10px); }

            #section-results, #section-results-2025 {
                min-height: auto;
                padding: 0 0 30px 0;
            }
            .results-content {
                padding: 40px 24px 40px;
                border-top: 1.5px solid #000;
                border-bottom: 1.5px solid #000;
                justify-content: flex-start;
                gap: 30px;
            }
            .results-title h1 { font-size: 36px; line-height: 1.1; margin-bottom: 4px; }
            .results-title h2 { font-size: 36px; line-height: 1.1; }
            .results-btn { align-self: flex-start; font-size: 14px; padding: 14px 24px; }
        }
    </style>
</head>
<body>
    <header class="header-bar" id="navbar">
        <a href="#" class="header-logo">
            <img src="https://i.imgur.com/fgXI0Gf.png" alt="Logo">
        </a>
        <div class="menu-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <div class="main-wrapper">
        <div id="section-hero" class="page-section">
            <div class="hero-text-container">
                <img src="https://i.imgur.com/vJ66HlC.png" alt="GVCS" class="img-gvcs">
                <img src="https://i.imgur.com/u7yzlre.png" alt="GLOBAL VISION CHRISTIAN SCHOOL" class="img-sub">
            </div>
            <hr class="mobile-divider">
            <span class="mobile-scroll-hint">아래로 스크롤하여 대학 입시 결과 보러가기</span>
        </div>
        <div id="section-results" class="page-section">
            <div class="results-content">
                <div class="results-title">
                    <h1>CLASS OF 2026</h1>
                    <h2>대학 입시결과</h2>
                </div>
                <a href="admission.html" class="results-btn">확인하러 가기</a>
            </div>
        </div>
        <div id="section-results-2025" class="page-section">
            <div class="results-content">
                <div class="results-title">
                    <h1>CLASS OF 2025</h1>
                    <h2>대학 입시결과</h2>
                </div>
                <a href="admission2025.html" class="results-btn">확인하러 가기</a>
            </div>
        </div>
    </div>

    <script>
        const isMobile = window.innerWidth <= 700;
        if (!isMobile) {
            let currentIdx = 0;
            const maxIdx = 2;
            const navbar = document.getElementById('navbar');
            const sec2026 = document.getElementById('section-results');
            const sec2025 = document.getElementById('section-results-2025');

            window.addEventListener('wheel', (e) => {
                if(Math.abs(e.deltaY) > 35) {
                    if(e.deltaY > 0 && currentIdx < maxIdx) currentIdx++;
                    else if(e.deltaY < 0 && currentIdx > 0) currentIdx--;
                    update();
                }
            }, {passive: false});

            function update() {
                if(currentIdx === 0) {
                    sec2026.style.transform = 'translateY(100vh)';
                    sec2025.style.transform = 'translateY(100vh)';
                } else if(currentIdx === 1) {
                    sec2026.style.transform = 'translateY(0)';
                    sec2025.style.transform = 'translateY(100vh)';
                } else if(currentIdx === 2) {
                    sec2026.style.transform = 'translateY(0)';
                    sec2025.style.transform = 'translateY(0)';
                }
                if(currentIdx > 0) navbar.classList.add('scrolled');
                else navbar.classList.remove('scrolled');
            }
        }
    </script>
</body>
</html>
