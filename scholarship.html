<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 장학금</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; background: #f0ede8; font-family: 'Noto Sans KR', sans-serif; color: #111; }

        /* 헤더 - 기존 사이트랑 통일 */
        .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 9999; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); }
        .header-logo { height: 44px; display: flex; align-items: center; }
        .header-logo img { height: 44px; width: auto; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
        .menu-btn span { display: block; width: 30px; height: 2px; background: white; border-radius: 2px; }

        .side-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99998; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .side-overlay.open { opacity: 1; pointer-events: all; }
        .side-menu { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: rgba(10,10,10,0.97); backdrop-filter: blur(20px); z-index: 99999; transition: right 0.4s cubic-bezier(0.16,1,0.3,1); display: flex; flex-direction: column; padding: 100px 50px 50px; }
        .side-menu.open { right: 0; }
        .side-nav-item a, .side-nav-item .nav-label { display: block; color: white; text-decoration: none; font-size: 26px; font-weight: 400; padding: 16px 0; cursor: pointer; transition: color 0.2s; }
        .side-nav-item a:hover { color: rgba(255,255,255,0.5); }
        .nav-sub { display: none; flex-direction: column; gap: 4px; padding: 0 0 14px 12px; }
        .side-nav-item:hover .nav-sub { display: flex; }
        .nav-sub a { font-size: 17px; color: rgba(255,255,255,0.6); padding: 5px 0; text-decoration: none; display: block; }
        .nav-sub a:hover { color: white; }
        @media (max-width: 700px) { .side-menu { width: 65%; right: -65%; } .nav-sub { display: none !important; } }

        /* 페이지 헤더 */
        .page-header { padding: 140px 60px 80px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .year-tabs { display: flex; gap: 8px; margin-bottom: 40px; }
        .year-tab { padding: 8px 20px; font-size: 13px; font-weight: 500; border: 1.5px solid rgba(0,0,0,0.2); color: rgba(0,0,0,0.4); text-decoration: none; transition: all 0.2s; }
        .year-tab.active, .year-tab:hover { background: #111; color: white; border-color: #111; }
        .page-title { font-size: clamp(60px, 12vw, 140px); font-weight: 900; line-height: 0.9; letter-spacing: -4px; margin-bottom: 28px; }
        .page-desc { font-size: 13px; color: rgba(0,0,0,0.35); letter-spacing: 2px; font-family: 'Space Mono', monospace; text-transform: uppercase; }

        /* 토탈 섹션 */
        .total-section { background: #111; color: white; padding: 70px 60px; }
        .total-tag { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 28px; }
        .total-krw { font-size: clamp(44px, 7vw, 84px); font-weight: 900; letter-spacing: -3px; margin-bottom: 14px; }
        .total-usd { font-size: clamp(22px, 3vw, 36px); color: rgba(255,255,255,0.3); font-family: 'Space Mono', monospace; }

        /* 나라별 섹션 - 스크롤하면서 보기 */
        .country-section { padding: 80px 60px; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; align-items: center; gap: 80px; opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }
        .country-section.visible { opacity: 1; transform: translateY(0); }
        .country-left { flex: 0 0 auto; }
        .country-num { font-family: 'Space Mono', monospace; font-size: 11px; color: rgba(0,0,0,0.25); letter-spacing: 2px; margin-bottom: 12px; }
        .country-name-big { font-size: clamp(60px, 10vw, 120px); font-weight: 900; letter-spacing: -4px; line-height: 0.9; color: #111; }
        .country-right { flex: 1; }
        .country-krw-big { font-size: clamp(28px, 4vw, 52px); font-weight: 700; letter-spacing: -2px; margin-bottom: 10px; }
        .country-usd-big { font-size: clamp(16px, 2vw, 24px); color: rgba(0,0,0,0.35); font-family: 'Space Mono', monospace; }
        .country-bar { height: 4px; background: rgba(0,0,0,0.08); margin-top: 24px; border-radius: 2px; overflow: hidden; }
        .country-bar-fill { height: 100%; background: #111; width: 0%; transition: width 1.2s cubic-bezier(0.16,1,0.3,1); border-radius: 2px; }

        #loading { text-align: center; padding: 200px 20px; color: rgba(0,0,0,0.3); font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 2px; }

        @media (max-width: 700px) {
            .page-header { padding: 110px 24px 50px; }
            .page-title { letter-spacing: -2px; }
            .total-section { padding: 40px 24px; }
            .country-section { padding: 50px 24px; flex-direction: column; align-items: flex-start; gap: 24px; }
            .country-name-big { font-size: clamp(48px, 14vw, 80px); letter-spacing: -2px; }
            .country-krw-big { font-size: clamp(22px, 6vw, 36px); }
        }
    </style>
</head>
<body>
    <div class="side-overlay" id="overlay" onclick="closeSideMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <nav class="side-nav">
            <div class="side-nav-item"><a href="index.html">Home</a></div>
            <div class="side-nav-item">
                <div class="nav-label">입시결과</div>
                <div class="nav-sub" id="admission-nav"></div>
            </div>
            <div class="side-nav-item">
                <div class="nav-label">장학금</div>
                <div class="nav-sub" id="scholarship-nav"></div>
            </div>
        </nav>
    </div>

    <header class="header-bar">
        <a href="index.html" class="header-logo">
            <img src="https://i.imgur.com/fgXI0Gf.png" alt="Logo">
        </a>
        <div class="menu-btn" onclick="toggleSideMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div id="loading">LOADING...</div>
    <div id="main-content" style="display:none;">
        <div class="page-header">
            <div class="year-tabs" id="year-tabs"></div>
            <h1 class="page-title" id="page-title">2026<br>장학금</h1>
            <div class="page-desc">Scholarship Results</div>
        </div>

        <div class="total-section">
            <div class="total-tag">Total Scholarship</div>
            <div class="total-krw" id="total-krw">0원</div>
            <div class="total-usd" id="total-usd">$0</div>
        </div>

        <div id="countries-container"></div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAr97vLewEWGy3igiJIdfh9gtweDemd2co",
        authDomain: "gvcs-admission.firebaseapp.com",
        projectId: "gvcs-admission",
        storageBucket: "gvcs-admission.firebasestorage.app",
        messagingSenderId: "744629757874",
        appId: "1:744629757874:web:23d91c55a14b1845d766ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const COUNTRIES = ['미국', '일본', '한국', '스페인', '홍콩', '호주', '독일'];
    const params = new URLSearchParams(window.location.search);
    const year = parseInt(params.get('year')) || 2026;

    function countUp(el, target, suffix, duration = 1800) {
        if (target === 0) { el.textContent = '0' + suffix; return; }
        const start = Date.now();
        const step = () => {
            const p = Math.min((Date.now() - start) / duration, 1);
            const eased = 1 - Math.pow(1 - p, 4);
            el.textContent = Math.floor(eased * target).toLocaleString() + suffix;
            if (p < 1) requestAnimationFrame(step);
            else el.textContent = target.toLocaleString() + suffix;
        };
        requestAnimationFrame(step);
    }

    function countUpUsd(el, target, duration = 1800) {
        if (target === 0) { el.textContent = '$0'; return; }
        const start = Date.now();
        const step = () => {
            const p = Math.min((Date.now() - start) / duration, 1);
            const eased = 1 - Math.pow(1 - p, 4);
            el.textContent = '$' + Math.floor(eased * target).toLocaleString();
            if (p < 1) requestAnimationFrame(step);
            else el.textContent = '$' + target.toLocaleString();
        };
        requestAnimationFrame(step);
    }

    async function load() {
        try {
            const docSnap = await getDoc(doc(db, 'config', 'siteData'));
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('page-title').innerHTML = `${year}<br>장학금`;
            document.title = `GVCS 장학금 ${year}`;

            let scholarshipData = {};
            if (docSnap.exists()) {
                const data = docSnap.data();
                data.admissionYears?.forEach(y => {
                    const a = document.createElement('a');
                    a.href = `admission.html?year=${y.year}`;
                    a.textContent = String(y.year);
                    document.getElementById('admission-nav').appendChild(a);
                });

                const tabs = document.getElementById('year-tabs');
                data.scholarshipYears?.forEach(y => {
                    const a = document.createElement('a');
                    a.href = `scholarship.html?year=${y.year}`;
                    a.className = 'year-tab' + (y.year === year ? ' active' : '');
                    a.textContent = String(y.year);
                    tabs.appendChild(a);

                    const b = document.createElement('a');
                    b.href = `scholarship.html?year=${y.year}`;
                    b.textContent = String(y.year);
                    document.getElementById('scholarship-nav').appendChild(b);
                });

                scholarshipData = data[`scholarship_${year}`] || {};
            }

            const container = document.getElementById('countries-container');
            let totalKrw = 0, totalUsd = 0;
            const cardData = [];

            COUNTRIES.forEach((country, idx) => {
                const d = scholarshipData[country] || { krw: 0, usd: 0 };
                totalKrw += d.krw || 0;
                totalUsd += d.usd || 0;
                cardData.push({ country, d, idx });

                const section = document.createElement('div');
                section.className = 'country-section';
                section.innerHTML = `
                    <div class="country-left">
                        <div class="country-num">${String(idx+1).padStart(2,'0')}</div>
                        <div class="country-name-big">${country}</div>
                    </div>
                    <div class="country-right">
                        <div class="country-krw-big" id="krw-${country}">0원</div>
                        <div class="country-usd-big" id="usd-${country}">$0</div>
                        <div class="country-bar"><div class="country-bar-fill" id="bar-${country}"></div></div>
                    </div>`;
                container.appendChild(section);
            });

            // 토탈 카운트업
            setTimeout(() => {
                countUp(document.getElementById('total-krw'), totalKrw, '원', 2000);
                countUpUsd(document.getElementById('total-usd'), totalUsd, 2000);
            }, 200);

            // 스크롤 인터섹션 옵저버
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        const country = entry.target.dataset.country;
                        const d = entry.target.dataset;
                        const krwEl = entry.target.querySelector('[id^="krw-"]');
                        const usdEl = entry.target.querySelector('[id^="usd-"]');
                        const barEl = entry.target.querySelector('.country-bar-fill');
                        const krw = parseInt(d.krw) || 0;
                        const usd = parseInt(d.usd) || 0;
                        const pct = parseInt(d.pct) || 0;
                        setTimeout(() => {
                            countUp(krwEl, krw, '원');
                            countUpUsd(usdEl, usd);
                            if (barEl) barEl.style.width = pct + '%';
                        }, 100);
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.2 });

            cardData.forEach(({ country, d }) => {
                const el = document.getElementById(`krw-${country}`)?.closest('.country-section');
                if (el) {
                    const pct = totalKrw > 0 ? Math.round((d.krw / totalKrw) * 100) : 0;
                    el.dataset.krw = d.krw || 0;
                    el.dataset.usd = d.usd || 0;
                    el.dataset.pct = pct;
                    observer.observe(el);
                }
            });

        } catch(e) {
            document.getElementById('loading').textContent = 'ERROR';
        }
    }

    window.toggleSideMenu = function() {
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    };
    window.closeSideMenu = function() {
        document.getElementById('sideMenu').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
    };

    load();
    </script>
</body>
</html>
