<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 장학금</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; min-height: 100%; background: #0a0a0a; font-family: 'Noto Sans KR', sans-serif; color: white; }

        .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 9999; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .header-logo { height: 50px; display: flex; align-items: center; }
        .header-logo img { height: 50px; width: auto; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
        .menu-btn span { display: block; width: 30px; height: 2px; background: white; border-radius: 2px; }

        .side-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99998; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .side-overlay.open { opacity: 1; pointer-events: all; }
        .side-menu { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: rgba(10,10,10,0.97); backdrop-filter: blur(20px); z-index: 99999; transition: right 0.4s cubic-bezier(0.16,1,0.3,1); display: flex; flex-direction: column; padding: 100px 50px 50px; }
        .side-menu.open { right: 0; }
        .side-nav-item a, .side-nav-item .nav-label { display: block; color: white; text-decoration: none; font-size: 26px; font-weight: 400; padding: 16px 0; cursor: pointer; transition: color 0.2s ease; }
        .side-nav-item a:hover { color: rgba(255,255,255,0.5); }
        .nav-sub { display: none; flex-direction: column; gap: 4px; padding: 0 0 14px 12px; }
        .side-nav-item:hover .nav-sub { display: flex; }
        .nav-sub a { font-size: 17px; color: rgba(255,255,255,0.6); padding: 5px 0; text-decoration: none; display: block; }
        .nav-sub a:hover { color: white; }
        @media (max-width: 700px) { .side-menu { width: 65%; right: -65%; } .nav-sub { display: none !important; } }

        .content { padding: 120px 60px 80px; max-width: 1100px; margin: 0 auto; }

        .page-title { font-size: 14px; letter-spacing: 3px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 12px; }
        .year-title { font-size: 60px; font-weight: 700; margin-bottom: 60px; }

        .total-section { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); padding: 40px 50px; margin-bottom: 50px; }
        .total-label { font-size: 13px; letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 16px; }
        .total-krw { font-size: 52px; font-weight: 700; margin-bottom: 8px; }
        .total-usd { font-size: 24px; color: rgba(255,255,255,0.5); }

        .countries-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .country-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 28px 32px; transition: border-color 0.2s; }
        .country-card:hover { border-color: rgba(255,255,255,0.2); }
        .country-name { font-size: 13px; letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 14px; }
        .country-krw { font-size: 30px; font-weight: 600; margin-bottom: 6px; }
        .country-usd { font-size: 15px; color: rgba(255,255,255,0.4); }
        .country-empty { color: rgba(255,255,255,0.2); font-size: 20px; }

        #loading { text-align: center; padding: 200px 20px; color: rgba(255,255,255,0.3); font-size: 16px; }

        @media (max-width: 700px) {
            .content { padding: 100px 24px 60px; }
            .year-title { font-size: 36px; margin-bottom: 36px; }
            .total-section { padding: 28px 24px; }
            .total-krw { font-size: 34px; }
            .total-usd { font-size: 18px; }
            .countries-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="side-overlay" id="overlay" onclick="closeSideMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <nav class="side-nav">
            <div class="side-nav-item"><a href="index.html">Home</a></div>
            <div class="side-nav-item">
                <div class="nav-label">입시결과</div>
                <div class="nav-sub" id="admission-nav"></div>
            </div>
            <div class="side-nav-item">
                <div class="nav-label">장학금</div>
                <div class="nav-sub" id="scholarship-nav"></div>
            </div>
        </nav>
    </div>

    <header class="header-bar">
        <a href="index.html" class="header-logo">
            <img src="https://i.imgur.com/fgXI0Gf.png" alt="Logo">
        </a>
        <div class="menu-btn" onclick="toggleSideMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div class="content">
        <div id="loading">불러오는 중...</div>
        <div id="main-content" style="display:none;">
            <div class="page-title">Scholarship</div>
            <div class="year-title" id="year-title">2026 장학금 현황</div>

            <div class="total-section">
                <div class="total-label">Total Scholarship</div>
                <div class="total-krw" id="total-krw">₩0</div>
                <div class="total-usd" id="total-usd">$0</div>
            </div>

            <div class="countries-grid" id="countries-grid"></div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAr97vLewEWGy3igiJIdfh9gtweDemd2co",
        authDomain: "gvcs-admission.firebaseapp.com",
        projectId: "gvcs-admission",
        storageBucket: "gvcs-admission.firebasestorage.app",
        messagingSenderId: "744629757874",
        appId: "1:744629757874:web:23d91c55a14b1845d766ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const year = parseInt(params.get('year')) || 2026;

    const COUNTRIES = ['미국', '일본', '한국', '스페인', '홍콩', '호주', '독일'];

    function countUp(el, target, prefix, suffix, duration = 2000) {
        const start = Date.now();
        const step = () => {
            const elapsed = Date.now() - start;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            const current = Math.floor(eased * target);
            el.textContent = prefix + current.toLocaleString() + suffix;
            if (progress < 1) requestAnimationFrame(step);
            else el.textContent = prefix + target.toLocaleString() + suffix;
        };
        requestAnimationFrame(step);
    }

    async function load() {
        try {
            const docSnap = await getDoc(doc(db, 'config', 'siteData'));
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('year-title').textContent = `${year} 장학금 현황`;

            let scholarshipData = {};
            if (docSnap.exists()) {
                const data = docSnap.data();

                // 사이드바
                const admNav = document.getElementById('admission-nav');
                const schNav = document.getElementById('scholarship-nav');
                data.admissionYears?.forEach(y => {
                    const a = document.createElement('a');
                    a.href = `admission.html?year=${y.year}`;
                    a.textContent = String(y.year);
                    admNav.appendChild(a);
                });
                data.scholarshipYears?.forEach(y => {
                    const a = document.createElement('a');
                    a.href = `scholarship.html?year=${y.year}`;
                    a.textContent = String(y.year);
                    schNav.appendChild(a);
                });

                // 장학금 데이터
                const yearKey = `scholarship_${year}`;
                scholarshipData = data[yearKey] || {};
            }

            // 나라별 카드
            const grid = document.getElementById('countries-grid');
            let totalKrw = 0, totalUsd = 0;

            COUNTRIES.forEach(country => {
                const d = scholarshipData[country] || { krw: 0, usd: 0 };
                totalKrw += d.krw || 0;
                totalUsd += d.usd || 0;

                const card = document.createElement('div');
                card.className = 'country-card';
                card.innerHTML = `
                    <div class="country-name">${country}</div>
                    <div class="country-krw" id="krw-${country}">₩0</div>
                    <div class="country-usd" id="usd-${country}">$0</div>`;
                grid.appendChild(card);
            });

            // 카운트업 애니메이션
            setTimeout(() => {
                COUNTRIES.forEach((country, i) => {
                    const d = scholarshipData[country] || { krw: 0, usd: 0 };
                    setTimeout(() => {
                        countUp(document.getElementById(`krw-${country}`), d.krw || 0, '₩', '', 1500);
                        countUp(document.getElementById(`usd-${country}`), d.usd || 0, '$', '', 1500);
                    }, i * 100);
                });
                setTimeout(() => {
                    countUp(document.getElementById('total-krw'), totalKrw, '₩', '', 2000);
                    countUp(document.getElementById('total-usd'), totalUsd, '$', '', 2000);
                }, 300);
            }, 300);

        } catch(e) {
            document.getElementById('loading').textContent = '불러오기 실패';
        }
    }

    window.toggleSideMenu = function() {
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    };
    window.closeSideMenu = function() {
        document.getElementById('sideMenu').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
    };

    load();
    </script>
</body>
</html>
