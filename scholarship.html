<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 장학금</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; min-height: 100%; background: #f0ede8; font-family: 'Noto Sans KR', sans-serif; color: #111; }

        .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 9999; background: rgba(240,237,232,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.08); }
        .header-logo { height: 44px; display: flex; align-items: center; }
        .header-logo img { height: 44px; width: auto; filter: invert(1); }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
        .menu-btn span { display: block; width: 28px; height: 1.5px; background: #111; }

        .side-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 99998; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .side-overlay.open { opacity: 1; pointer-events: all; }
        .side-menu { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: rgba(10,10,10,0.97); backdrop-filter: blur(20px); z-index: 99999; transition: right 0.4s cubic-bezier(0.16,1,0.3,1); display: flex; flex-direction: column; padding: 100px 50px 50px; }
        .side-menu.open { right: 0; }
        .side-nav-item a, .side-nav-item .nav-label { display: block; color: white; text-decoration: none; font-size: 26px; font-weight: 400; padding: 16px 0; cursor: pointer; transition: color 0.2s; }
        .side-nav-item a:hover { color: rgba(255,255,255,0.5); }
        .nav-sub { display: none; flex-direction: column; gap: 4px; padding: 0 0 14px 12px; }
        .side-nav-item:hover .nav-sub { display: flex; }
        .nav-sub a { font-size: 17px; color: rgba(255,255,255,0.6); padding: 5px 0; text-decoration: none; display: block; }
        .nav-sub a:hover { color: white; }
        @media (max-width: 700px) { .side-menu { width: 65%; right: -65%; } .nav-sub { display: none !important; } }

        .content { padding: 110px 40px 100px; max-width: 1100px; margin: 0 auto; }

        /* 헤더 */
        .page-header { padding: 60px 0 80px; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 60px; }
        .year-tabs { display: flex; gap: 8px; margin-bottom: 40px; }
        .year-tab { padding: 8px 20px; font-size: 13px; font-weight: 500; border: 1.5px solid rgba(0,0,0,0.15); color: rgba(0,0,0,0.4); text-decoration: none; transition: all 0.2s; }
        .year-tab.active { background: #111; color: white; border-color: #111; }
        .year-tab:hover:not(.active) { border-color: #111; color: #111; }
        .page-title { font-size: clamp(52px, 9vw, 120px); font-weight: 900; line-height: 0.9; letter-spacing: -3px; margin-bottom: 20px; }
        .page-desc { font-size: 14px; color: rgba(0,0,0,0.4); letter-spacing: 1px; font-family: 'Space Mono', monospace; }

        /* 토탈 */
        .total-section { background: #111; color: white; padding: 60px; margin-bottom: 60px; }
        .total-tag { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 24px; }
        .total-krw { font-size: clamp(40px, 7vw, 80px); font-weight: 900; letter-spacing: -2px; margin-bottom: 12px; font-family: 'Space Mono', monospace; }
        .total-usd { font-size: clamp(20px, 3vw, 32px); color: rgba(255,255,255,0.35); font-family: 'Space Mono', monospace; }

        /* 나라 그리드 */
        .countries-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .country-card { padding: 36px 32px; position: relative; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between; }
        .country-card .top { display: flex; justify-content: space-between; align-items: flex-start; }
        .country-num { font-family: 'Space Mono', monospace; font-size: 11px; opacity: 0.4; }
        .country-name { font-size: 28px; font-weight: 700; letter-spacing: -1px; margin-bottom: 16px; }
        .country-krw { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; }
        .country-usd { font-family: 'Space Mono', monospace; font-size: 14px; opacity: 0.5; }

        /* 나라별 색상 */
        .card-0 { background: #c8e6c9; }
        .card-1 { background: #ffccbc; }
        .card-2 { background: #bbdefb; }
        .card-3 { background: #f8bbd0; }
        .card-4 { background: #fff9c4; }
        .card-5 { background: #d7ccc8; }
        .card-6 { background: #b2dfdb; }

        #loading { text-align: center; padding: 200px 20px; color: rgba(0,0,0,0.3); font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 2px; }

        @media (max-width: 900px) { .countries-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) {
            .content { padding: 90px 16px 60px; }
            .total-section { padding: 32px 24px; }
            .countries-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .country-card { padding: 20px 16px; min-height: 140px; }
            .country-name { font-size: 18px; }
            .country-krw { font-size: 14px; }
            .page-title { letter-spacing: -2px; }
        }
    </style>
</head>
<body>
    <div class="side-overlay" id="overlay" onclick="closeSideMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <nav class="side-nav">
            <div class="side-nav-item"><a href="index.html">Home</a></div>
            <div class="side-nav-item">
                <div class="nav-label">입시결과</div>
                <div class="nav-sub" id="admission-nav"></div>
            </div>
            <div class="side-nav-item">
                <div class="nav-label">장학금</div>
                <div class="nav-sub" id="scholarship-nav"></div>
            </div>
        </nav>
    </div>

    <header class="header-bar">
        <a href="index.html" class="header-logo">
            <img src="https://i.imgur.com/fgXI0Gf.png" alt="Logo">
        </a>
        <div class="menu-btn" onclick="toggleSideMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div class="content">
        <div id="loading">LOADING...</div>
        <div id="main-content" style="display:none;">
            <div class="page-header">
                <div class="year-tabs" id="year-tabs"></div>
                <h1 class="page-title" id="page-title">2026<br>장학금</h1>
                <div class="page-desc">SCHOLARSHIP RESULTS / 장학금 현황</div>
            </div>

            <div class="total-section">
                <div class="total-tag">Total Scholarship</div>
                <div class="total-krw" id="total-krw">0원</div>
                <div class="total-usd" id="total-usd">$0</div>
            </div>

            <div class="countries-grid" id="countries-grid"></div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAr97vLewEWGy3igiJIdfh9gtweDemd2co",
        authDomain: "gvcs-admission.firebaseapp.com",
        projectId: "gvcs-admission",
        storageBucket: "gvcs-admission.firebasestorage.app",
        messagingSenderId: "744629757874",
        appId: "1:744629757874:web:23d91c55a14b1845d766ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const COUNTRIES = ['미국', '일본', '한국', '스페인', '홍콩', '호주', '독일'];
    const params = new URLSearchParams(window.location.search);
    const year = parseInt(params.get('year')) || 2026;

    function countUp(el, target, suffix, duration = 1800) {
        if (target === 0) { el.textContent = '0' + suffix; return; }
        const start = Date.now();
        const step = () => {
            const p = Math.min((Date.now() - start) / duration, 1);
            const eased = 1 - Math.pow(1 - p, 4);
            el.textContent = Math.floor(eased * target).toLocaleString() + suffix;
            if (p < 1) requestAnimationFrame(step);
            else el.textContent = target.toLocaleString() + suffix;
        };
        requestAnimationFrame(step);
    }

    function countUpUsd(el, target, duration = 1800) {
        if (target === 0) { el.textContent = '$0'; return; }
        const start = Date.now();
        const step = () => {
            const p = Math.min((Date.now() - start) / duration, 1);
            const eased = 1 - Math.pow(1 - p, 4);
            el.textContent = '$' + Math.floor(eased * target).toLocaleString();
            if (p < 1) requestAnimationFrame(step);
            else el.textContent = '$' + target.toLocaleString();
        };
        requestAnimationFrame(step);
    }

    async function load() {
        try {
            const docSnap = await getDoc(doc(db, 'config', 'siteData'));
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('page-title').innerHTML = `${year}<br>장학금`;
            document.title = `GVCS 장학금 ${year}`;

            let scholarshipData = {};
            if (docSnap.exists()) {
                const data = docSnap.data();

                data.admissionYears?.forEach(y => {
                    const a = document.createElement('a');
                    a.href = `admission.html?year=${y.year}`;
                    a.textContent = String(y.year);
                    document.getElementById('admission-nav').appendChild(a);
                });

                const tabs = document.getElementById('year-tabs');
                data.scholarshipYears?.forEach(y => {
                    const a = document.createElement('a');
                    a.href = `scholarship.html?year=${y.year}`;
                    a.className = 'year-tab' + (y.year === year ? ' active' : '');
                    a.textContent = String(y.year);
                    tabs.appendChild(a);

                    const b = document.createElement('a');
                    b.href = `scholarship.html?year=${y.year}`;
                    b.textContent = String(y.year);
                    document.getElementById('scholarship-nav').appendChild(b);
                });

                scholarshipData = data[`scholarship_${year}`] || {};
            }

            const grid = document.getElementById('countries-grid');
            let totalKrw = 0, totalUsd = 0;
            const cardData = [];

            COUNTRIES.forEach((country, idx) => {
                const d = scholarshipData[country] || { krw: 0, usd: 0 };
                totalKrw += d.krw || 0;
                totalUsd += d.usd || 0;
                cardData.push({ country, d, idx });

                const card = document.createElement('div');
                card.className = `country-card card-${idx}`;
                card.innerHTML = `
                    <div class="top">
                        <div class="country-num">${String(idx+1).padStart(2,'0')}</div>
                    </div>
                    <div>
                        <div class="country-name">${country}</div>
                        <div class="country-krw" id="krw-${country}">0원</div>
                        <div class="country-usd" id="usd-${country}">$0</div>
                    </div>`;
                grid.appendChild(card);
            });

            setTimeout(() => {
                cardData.forEach(({ country, d }, i) => {
                    setTimeout(() => {
                        countUp(document.getElementById(`krw-${country}`), d.krw || 0, '원');
                        countUpUsd(document.getElementById(`usd-${country}`), d.usd || 0);
                    }, i * 80);
                });
                countUp(document.getElementById('total-krw'), totalKrw, '원', 2200);
                countUpUsd(document.getElementById('total-usd'), totalUsd, 2200);
            }, 200);

        } catch(e) {
            document.getElementById('loading').textContent = 'ERROR';
        }
    }

    window.toggleSideMenu = function() {
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    };
    window.closeSideMenu = function() {
        document.getElementById('sideMenu').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
    };

    load();
    </script>
</body>
</html>
