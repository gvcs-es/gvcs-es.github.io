<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 글로벌선진학교 음성캠퍼스</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gvcs-red: #9a1e23; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #000; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }

        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px; 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 9999;
        }
        
        .header-logo { height: 56px; display: flex; align-items: center; text-decoration: none; }
        .header-logo img { height: 56px; width: auto; display: block; }
        
        .header-menu { display: flex; list-style: none; gap: 30px; }
        .header-menu a { color: white; text-decoration: none; font-size: 14px; }

        .main-wrapper { width: 100%; height: 100%; position: relative; }
        .page-section {
            width: 100%; height: 100vh; position: absolute; top: 0; left: 0;
            transition: transform 1.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 🖼️ 배경 이미지 직접 호출 */
        #section-hero { 
            z-index: 1; 
            background-image: url('https://i.imgur.com/BCMjATY.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            display: flex; justify-content: center; align-items: center;
        }
        
        #section-results { 
            z-index: 2; background: var(--gvcs-red); color: white; display: grid; grid-template-columns: 1fr 1fr;
            transform: translateY(100vh);
        }
        .cta-content { padding: 100px; display: flex; flex-direction: column; justify-content: center; }
        .cta-btn { display: inline-block; width: fit-content; padding: 20px 40px; background: white; color: var(--gvcs-red); text-decoration: none; font-weight: 700; margin-top: 20px; }
    </style>
</head>
<body>
    <header class="header-bar">
        <a href="#" class="header-logo">
            <img src="https://i.imgur.com/fgXI0Gf.png" alt="GVCS Logo">
        </a>
        <ul class="header-menu">
            <li><a href="javascript:goToSection(0)">HOME</a></li>
            <li><a href="javascript:goToSection(1)">입시결과</a></li>
        </ul>
    </header>

    <div class="main-wrapper">
        <div id="section-hero" class="page-section"></div>
        <div id="section-results" class="page-section">
            <div class="cta-content">
                <h2>글로벌선진학교<br>대학 입시 결과 확인</h2>
                <a href="#" class="cta-btn">결과 확인하기</a>
            </div>
            <div></div>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        const sections = document.querySelectorAll('.page-section');
        let isScrolling = false;
        window.addEventListener('wheel', (e) => {
            if(isScrolling) return;
            if(Math.abs(e.deltaY) > 35) {
                if(e.deltaY > 0 && currentIdx < 1) currentIdx++;
                else if(e.deltaY < 0 && currentIdx > 0) currentIdx--;
                update();
            }
        }, {passive: false});
        function update() {
            isScrolling = true;
            sections[0].style.opacity = currentIdx === 0 ? '1' : '0';
            sections[1].style.transform = currentIdx === 1 ? 'translateY(0)' : 'translateY(100vh)';
            setTimeout(() => isScrolling = false, 1400);
        }
        function goToSection(idx) { currentIdx = idx; update(); }
    </script>
</body>
</html>
