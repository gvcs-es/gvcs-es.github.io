<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 글로벌선진학교 음성캠퍼스</title>
    <style>
        :root { --gvcs-red: #9a1e23; --gvcs-blue: #1a3a6b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #000; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }

        .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 9999; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%); transition: background 0.5s ease; }
        .header-bar.scrolled { background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); }
        .header-logo { height: 50px; display: flex; align-items: center; z-index: 10000; }
        .header-logo img { height: 50px; width: auto; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 6px; z-index: 10000; }
        .menu-btn span { display: block; width: 30px; height: 2px; background: white; border-radius: 2px; transition: all 0.3s ease; }

        .side-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99998; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .side-overlay.open { opacity: 1; pointer-events: all; }
        .side-menu { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: rgba(10,10,10,0.97); backdrop-filter: blur(20px); z-index: 99999; transition: right 0.4s cubic-bezier(0.16,1,0.3,1); display: flex; flex-direction: column; padding: 100px 50px 50px; overflow-y: auto; }
        .side-menu.open { right: 0; }
        .side-nav { display: flex; flex-direction: column; gap: 0; }
        .side-nav-item { border-bottom: none; }
        .side-nav-item a, .side-nav-item .nav-label { display: block; color: white; text-decoration: none; font-size: 26px; font-weight: 400; padding: 16px 0; cursor: pointer; transition: color 0.2s ease; }
        .side-nav-item a:hover, .side-nav-item .nav-label:hover { color: rgba(255,255,255,0.5); }
        .nav-sub { display: none; flex-direction: column; gap: 4px; padding: 0 0 14px 12px; }
        .side-nav-item:hover .nav-sub { display: flex; }
        .nav-sub a { font-size: 17px; font-weight: 400; color: rgba(255,255,255,0.6); padding: 5px 0; border-bottom: none; text-decoration: none; display: block; }
        .nav-sub a:hover { color: white; }
        .nav-label-wrap { display: flex; align-items: center; justify-content: space-between; }

        #admin-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 28px; font-size: 15px; z-index: 999999; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; white-space: nowrap; }
        #admin-toast.show { opacity: 1; }

        #admin-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999990; display: none; align-items: center; justify-content: center; }
        #admin-modal-overlay.open { display: flex; }
        #admin-modal { background: #1a1a1a; color: white; width: 1000px; max-width: 95vw; max-height: 85vh; border-radius: 0; overflow: hidden; display: flex; flex-direction: column; }
        #admin-modal-header { padding: 24px 28px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        #admin-modal-header h2 { font-size: 20px; font-weight: 600; }
        #admin-modal-close { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
        #admin-modal-body { display: flex; flex: 1; overflow: hidden; }
        #admin-menu { width: 200px; border-right: 1px solid rgba(255,255,255,0.1); padding: 20px 0; flex-shrink: 0; }
        .admin-menu-item { padding: 12px 24px; cursor: pointer; font-size: 15px; color: rgba(255,255,255,0.7); transition: all 0.2s; }
        .admin-menu-item:hover, .admin-menu-item.active { background: rgba(255,255,255,0.08); color: white; }
        #admin-content { flex: 1; padding: 24px; overflow-y: auto; }
        .admin-panel { display: none; }
        .admin-panel.active { display: block; }
        .admin-panel h3 { font-size: 16px; margin-bottom: 20px; color: rgba(255,255,255,0.8); }
        .year-list { display: flex; flex-direction: column; gap: 12px; }
        .year-item { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 12px 16px; }
        .color-input { width: 40px; height: 32px; border: none; cursor: pointer; background: none; padding: 0; }
        .url-input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 6px 10px; font-size: 13px; }
        .url-input::placeholder { color: rgba(255,255,255,0.3); }
        .del-btn { background: none; border: none; color: rgba(255,80,80,0.7); cursor: pointer; font-size: 18px; }
        .order-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer; font-size: 14px; padding: 4px 8px; line-height: 1; }
        .order-btn:hover { background: rgba(255,255,255,0.1); }
        .save-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 20px; cursor: pointer; font-size: 13px; margin-top: 16px; }
        .save-btn:hover { background: rgba(255,255,255,0.2); }
        .add-year-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); background: none; color: white; font-size: 24px; cursor: pointer; margin-top: 12px; display: flex; align-items: center; justify-content: center; }
        .add-year-btn:hover { border-color: white; }
        .input-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        .slide-item { background: rgba(255,255,255,0.05); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .slide-label { font-size: 13px; color: rgba(255,255,255,0.6); min-width: 60px; }
        .sch-country-row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 12px 16px; margin-bottom: 8px; }
        .notice-editor-wrap { background: rgba(255,255,255,0.05); padding: 16px; margin-bottom: 12px; }
        .notice-content-editor { width: 100%; min-height: 120px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 10px; font-size: 14px; line-height: 1.5; outline: none; font-family: 'Noto Sans KR', sans-serif; }
        .notice-content-editor p { margin-bottom: 0.8em; }
        #float-toolbar { position: fixed; background: #2a2a2a; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; display: none; align-items: center; gap: 2px; padding: 5px 8px; z-index: 9999999; box-shadow: 0 4px 20px rgba(0,0,0,0.6); pointer-events: all; }
        #float-toolbar button { background: none; border: none; color: white; cursor: pointer; font-size: 13px; padding: 4px 8px; border-radius: 4px; line-height: 1; }
        #float-toolbar button:hover { background: rgba(255,255,255,0.15); }
        #float-toolbar .ft-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); margin: 0 3px; }
        #ft-hl-btn.hl-on { background: rgba(255,220,0,0.3); }
        #link-suggest-modal { display: none; }
        .ft-color-wrap { position: relative; }
        .ft-color-sub { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); background: #2a2a2a; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 8px; padding-top: 16px; display: none; flex-direction: column; gap: 6px; z-index: 10000000; box-shadow: 0 4px 20px rgba(0,0,0,0.6); min-width: 140px; }
        .ft-color-sub.visible { display: flex; }x
        .ft-preset-colors { display: flex; gap: 4px; flex-wrap: wrap; }
        .ft-preset-btn { width: 20px; height: 20px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; border-radius: 3px; flex-shrink: 0; }
        .ft-preset-btn:hover { transform: scale(1.2); }
        .ft-recent-colors { display: flex; gap: 4px; flex-wrap: wrap; }
        .ft-recent-btn { width: 20px; height: 20px; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; border-radius: 3px; flex-shrink: 0; }
        .ft-recent-btn:hover { transform: scale(1.2); }
        .ft-color-pick-row { display: flex; align-items: center; gap: 6px; position: relative; }
        .ft-color-pick-row label { font-size: 11px; color: rgba(255,255,255,0.5); }
        .ft-color-pick-row input[type="color"] { width: 24px; height: 24px; border: none; cursor: pointer; background: none; padding: 0; border-radius: 3px; }
        .ft-pick-hover-guard { position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; z-index: -1; }
        .ft-sub-label { font-size: 10px; color: rgba(255,255,255,0.4); }

        .main-wrapper { width: 100%; height: 100%; position: relative; }
        .page-section { width: 100%; height: 100vh; position: absolute; top: 0; left: 0; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform; }
        #section-hero { z-index: 1; position: relative; overflow: hidden; }
        .hero-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: opacity 2s ease; }
        .hero-slide.pc-slide { opacity: 0; }
        .hero-slide.pc-slide.active { opacity: 1; }
        .hero-text-container { position: absolute; bottom: 30px; left: 30px; z-index: 10; display: flex; flex-direction: row; align-items: flex-end; gap: 15px; }
        .img-gvcs { height: 175px; width: auto; flex-shrink: 0; }
        .img-sub { height: 150px; width: auto; flex-shrink: 0; align-self: flex-end; margin-bottom: 8px; }
        @keyframes bounce { 0% { transform: translateY(0); } 50% { transform: translateY(-25px); } 100% { transform: translateY(0); } }
        .hero-text-container.bouncing { animation: bounce 2s ease-in-out infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        #pc-scroll-hint { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); z-index: 10; color: white; font-size: 16px; opacity: 0; transition: opacity 0.6s ease; pointer-events: none; white-space: nowrap; }
        #pc-scroll-hint.visible { opacity: 1; animation: pulse 2s ease-in-out infinite; }
        .results-section { color: white; }
        .results-content { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 110px 40px 40px; }
        .results-title h1 { font-size: 160px; font-weight: 700; color: white; line-height: 1; }
        .results-title h2 { font-size: 160px; font-weight: 700; color: white; line-height: 1; }
        .results-btns { display: flex; gap: 16px; align-self: flex-end; }
        .results-btn { border: 2px solid white; color: white; padding: 18px 40px; font-size: 18px; text-decoration: none; transition: all 0.3s ease; }
        .results-btn:hover { background: white; color: inherit; }
        .mobile-divider, .mobile-scroll-hint { display: none; }

        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99990; opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
        #popup-overlay.open { opacity: 1; pointer-events: all; }
        #popup-wrap { position: fixed; top: 50%; left: calc(50% - 280px); transform: translateY(-50%); width: 0; max-height: 90vh; overflow: hidden; z-index: 99991; transition: width 1.5s cubic-bezier(0.16,1,0.3,1); }
        #popup-wrap.open { width: 560px; }
        #popup { width: 560px; background: #000; border-radius: 0; padding: 0; overflow-y: auto; max-height: 90vh; position: relative; }
        #popup-img { width: 100%; display: block; }
        #popup-more { border: 1.5px solid white; color: white; background: none; padding: 10px 24px; font-size: 14px; cursor: pointer; }
        #popup-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: white; z-index: 10; }

        @media (max-width: 700px) {
            html, body { overflow: auto; height: auto; }
            .main-wrapper { height: auto; position: static; }
            .page-section { position: static; height: auto; transform: none !important; transition: none !important; }
            #section-hero { display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; background: var(--gvcs-red); padding-top: 90px; padding-bottom: 40px; min-height: 100vh; overflow: hidden; }
            .mobile-bg-wrap { display: block; width: 90%; margin: 0 auto; aspect-ratio: 16 / 9; position: relative; flex-shrink: 0; border: 1.5px solid #000; }
            .mobile-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.2s ease; }
            .mobile-slide.active { opacity: 1; }
            .hero-slide { display: none; }
            .hero-text-container { position: static; flex-direction: column; align-items: flex-start; gap: 16px; margin-top: 24px; padding-left: 5%; animation: none !important; }
            .img-gvcs { height: 70px; }
            .img-sub { height: 50px; margin-bottom: 0; }
            .mobile-divider { display: block; width: 90%; margin: 24px auto 14px; border: none; border-top: 1.5px solid white; }
            .mobile-scroll-hint { display: block; width: 90%; margin: 0 auto; color: white; font-size: 13px; }
            #pc-scroll-hint { display: none !important; }
            .header-bar { background: rgba(0,0,0,0.7) !important; backdrop-filter: blur(10px); }
            .results-section { min-height: auto; padding: 0; }
            .results-content { padding: 40px 24px 40px; border-top: 1.5px solid #000; border-bottom: 1.5px solid #000; justify-content: flex-start; gap: 30px; }
            .results-title h1 { font-size: 36px; line-height: 1.1; margin-bottom: 4px; }
            .results-title h2 { font-size: 36px; line-height: 1.1; }
            .results-btns { flex-direction: column; align-self: flex-start; gap: 10px; }
            .results-btn { font-size: 14px; padding: 14px 24px; }
            .side-menu { width: 65%; right: -65%; padding: 80px 30px 40px; }
            .side-nav-item a, .side-nav-item .nav-label { font-size: 20px; padding: 12px 0; }
            .nav-sub { display: none !important; }
            #popup-wrap { left: 5%; transform: translateY(-50%); }
            #popup-wrap.open { width: 90vw; }
            #popup { width: 90vw; padding: 0; }
            #popup-more { font-size: 12px; padding: 8px 16px; bottom: 12px; right: 12px; }
            #popup-img { border: none; outline: none; }
            #popup-close { top: 10px; right: 10px; }
            #admin-modal { width: 95vw; }
            #admin-modal-body { flex-direction: column; }
            #admin-menu { width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px 0; display: flex; overflow-x: auto; }
            .admin-menu-item { white-space: nowrap; }
        }
    </style>
</head>
<body>

<div id="admin-toast">관리자 모드로 전환하셨습니다</div>

<div id="admin-modal-overlay">
    <div id="admin-modal">
        <div id="admin-modal-header">
            <h2>관리 콘솔</h2>
            <button id="admin-modal-close" onclick="closeAdminModal()">✕</button>
        </div>
        <div id="admin-modal-body">
            <div id="admin-menu">
                <div class="admin-menu-item active" onclick="showPanel('home', this)">홈 이미지</div>
                <div class="admin-menu-item" onclick="showPanel('admission', this)">입시결과</div>
                <div class="admin-menu-item" onclick="showPanel('scholarship', this)">장학금</div>
                <div class="admin-menu-item" onclick="showPanel('popup', this)">팝업</div>
                <div class="admin-menu-item" onclick="showPanel('notice', this)">공지사항</div>
            </div>
            <div id="admin-content">
                <div class="admin-panel active" id="panel-home">
                    <h3>홈페이지 메인 이미지 관리</h3>
                    <div id="home-slides-list"></div>
                    <button class="save-btn" onclick="addHomeSlide()">+ 슬라이드 추가</button><br>
                    <button class="save-btn" onclick="saveHomeImages()">저장</button>
                </div>
                <div class="admin-panel" id="panel-admission">
                    <h3>입시결과 관리</h3>
                    <div class="year-list" id="admission-year-list"></div>
                    <button class="add-year-btn" onclick="addAdmissionYear()">+</button><br>
                    <button class="save-btn" onclick="saveAdmission()">저장</button>
                </div>
                <div class="admin-panel" id="panel-scholarship">
                    <h3>장학금 관리</h3>
                    <div id="sch-year-tabs" style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;"></div>
                    <div id="scholarship-input-list"></div>
                    <button class="add-year-btn" onclick="addSchCountry()">+</button><br>
                    <button class="save-btn" onclick="saveScholarshipData()">저장</button>
                </div>
            <div class="admin-panel" id="panel-popup">
                    <h3>팝업 관리</h3>
                    <div style="display:flex;flex-direction:column;gap:12px;">
                        <div>
                            <div class="input-label" style="margin-bottom:6px;">팝업 표시 여부</div>
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                <input type="checkbox" id="popup-visible" style="width:16px;height:16px;">
                                <span style="font-size:14px;color:rgba(255,255,255,0.7);">팝업 표시</span>
                            </label>
                        </div>
                        <div>
                            <div class="input-label" style="margin-bottom:6px;">팝업 이미지 URL</div>
                            <input class="url-input" id="popup-img-url" placeholder="이미지 링크" style="width:100%;">
                        </div>
                        <div>
                            <div class="input-label" style="margin-bottom:6px;">버튼 텍스트</div>
                            <input class="url-input" id="popup-btn-text" placeholder="자세히 알아보기" style="width:100%;">
                        </div>
                        <div>
                            <div class="input-label" style="margin-bottom:6px;">버튼 링크</div>
                            <input class="url-input" id="popup-btn-link" placeholder="notice.html" style="width:100%;">
                        </div>
                    </div>
                    <button class="save-btn" onclick="savePopup()">저장</button>
                </div>
                <div class="admin-panel" id="panel-notice">
                    <h3>공지사항 관리</h3>
                    <div id="notice-list"></div>
                    <button class="add-year-btn" onclick="addNotice()">+</button><br>
                    <button class="save-btn" onclick="saveNotices()">저장</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="side-overlay" id="overlay"></div>
<div class="side-menu" id="sideMenu">
    <nav class="side-nav">
        <div class="side-nav-item">
            <a href="#" onclick="goHome(); closeSideMenu(); return false;">Home</a>
        </div>
        <div class="side-nav-item">
            <div class="nav-label pc-only">입시결과</div>
            <div class="nav-sub pc-only" id="admission-nav-sub"></div>
            <div class="nav-label-wrap mobile-only" onclick="mobileGoTo('section-results-0'); closeSideMenu();">
                <span style="color:white;font-size:26px;font-weight:400;padding:16px 0;display:block;">입시결과</span>
            </div>
        </div>
        <div class="side-nav-item">
            <div class="nav-label pc-only">장학금</div>
            <div class="nav-sub pc-only" id="scholarship-nav-sub"></div>
            <div class="nav-label-wrap mobile-only" onclick="mobileGoTo('section-results-0'); closeSideMenu();">
                <span style="color:white;font-size:26px;font-weight:400;padding:16px 0;display:block;">장학금</span>
            </div>
        </div>
        <div class="side-nav-item">
            <a href="notice.html">공지사항</a>
        </div>
        <div class="side-nav-item" id="admin-console-item" style="display:none;">
            <a href="#" onclick="openAdminModal(); closeSideMenu(); return false;" style="color:rgba(255,200,0,0.8);">관리 콘솔</a>
        </div>
    </nav>
</div>

<header class="header-bar" id="navbar">
    <a href="#" class="header-logo" onclick="goHome(); return false;">
        <img src="https://i.imgur.com/fgXI0Gf.png" alt="Logo">
    </a>
    <div class="header-right">
        <button id="muteBtn" onclick="toggleMute()" style="background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>

        </button>
        <div class="menu-btn" id="menuBtn" onclick="toggleSideMenu()">
            <span></span><span></span><span></span>
        </div>

</header>

<div class="main-wrapper" id="mainWrapper">
    <div id="section-hero" class="page-section">
        <div class="hero-slide pc-slide active" style="background-image:url('https://i.imgur.com/BCMjATY.png');"></div>
        <div class="hero-slide pc-slide" style="background-image:url('https://i.imgur.com/3mBbuNJ.png');"></div>
        <div class="hero-slide pc-slide" style="background-image:url('https://i.imgur.com/q8fX4VO.png');"></div>
        <div class="mobile-bg-wrap">
            <div class="mobile-slide active" style="background-image:url('https://i.imgur.com/BCMjATY.png');"></div>
            <div class="mobile-slide" style="background-image:url('https://i.imgur.com/3mBbuNJ.png');"></div>
            <div class="mobile-slide" style="background-image:url('https://i.imgur.com/q8fX4VO.png');"></div>
        </div>
        <div class="hero-text-container" id="heroTextContainer">
            <img src="https://i.imgur.com/vJ66HlC.png" alt="GVCS" class="img-gvcs">
            <img src="https://i.imgur.com/u7yzlre.png" alt="GLOBAL VISION CHRISTIAN SCHOOL" class="img-sub">
        </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

const firebaseConfig = {
    apiKey: "AIzaSyAr97vLewEWGy3igiJIdfh9gtweDemd2co",
    authDomain: "gvcs-admission.firebaseapp.com",

    appId: "1:744629757874:web:23d91c55a14b1845d766ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const COUNTRIES = ['미국', '일본', '한국', '스페인', '홍콩', '호주', '독일'];

let siteData = {
    homeSlides: [
        { url: 'https://i.imgur.com/BCMjATY.png' },
        { url: 'https://i.imgur.com/3mBbuNJ.png' },

    ],
    scholarshipYears: [
        { year: 2026, color: '#9a1e23', url: 'scholarship.html?year=2026' },

};

let currentIdx = 0;
let currentSchYear = 2026;
const isMobile = window.innerWidth <= 700;

async function loadData() {
    try {
        const docSnap = await getDoc(doc(db, 'config', 'siteData'));
        if (docSnap.exists()) siteData = { ...siteData, ...docSnap.data() };
    } catch(e) {}
    renderSections();
    renderSideNav();
    // 팝업 설정 반영
    if (siteData.popupVisible === false) {
        document.getElementById('popup-wrap').style.display = 'none';

    if (siteData.popupBtnText) document.getElementById('popup-more').textContent = siteData.popupBtnText;
    if (siteData.popupBtnLink) document.getElementById('popup-more').onclick = () => location.href = siteData.popupBtnLink;
}

function renderSections() {
    const container = document.getElementById('sections-container');
    container.innerHTML = '';
    siteData.admissionYears.forEach((y, i) => {
        const div = document.createElement('div');
        div.className = 'page-section results-section';
        div.id = `section-results-${i}`;

            <div class="results-content">
                <div class="results-title">

                    <h2>대학 입시결과</h2>

                    <a href="scholarship.html?year=${y.year}" class="results-btn">장학금 확인하러 가기</a>
                    <a href="admission.html?year=${y.year}" class="results-btn">확인하러 가기</a>
                </div>
            </div>`;
        container.appendChild(div);
    });
    window._maxIdx = siteData.admissionYears.length;
}

function renderSideNav() {
    const admSub = document.getElementById('admission-nav-sub');
    const schSub = document.getElementById('scholarship-nav-sub');
    admSub.innerHTML = '';
    schSub.innerHTML = '';
    siteData.admissionYears.forEach((y, i) => {
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = String(y.year);
        a.onclick = (e) => { e.preventDefault(); goTo(i+1); closeSideMenu(); };
        admSub.appendChild(a);
    });
    siteData.scholarshipYears.forEach((y) => {
        const a = document.createElement('a');
        a.href = `scholarship.html?year=${y.year}`;
        a.textContent = String(y.year);
        schSub.appendChild(a);
    });
}

function update() {
    const sections = document.querySelectorAll('.results-section');
    sections.forEach((s, i) => {
        const offset = i - (currentIdx - 1);
        if (currentIdx === 0) {
            s.style.transform = `translateY(${(i+1)*100}vh)`;
        } else {
            s.style.transform = `translateY(${offset * 100}vh)`;
        }
    });
    document.getElementById('navbar').classList.toggle('scrolled', currentIdx > 0);
    if (currentIdx > 0) {
        document.getElementById('pc-scroll-hint').classList.remove('visible');
        document.getElementById('heroTextContainer').classList.remove('bouncing');
    }
}

window.goHome = function() { currentIdx = 0; update(); };
window.goTo = function(idx) { currentIdx = idx; update(); };
window.mobileGoTo = function(id) {
    const el = document.getElementById(id);
    if(el) el.scrollIntoView({ behavior: 'smooth' });
};

if (!isMobile) {
    let scrolling = false, accumulated = 0;
    window.addEventListener('wheel', (e) => {
        if (document.getElementById('admin-modal-overlay').classList.contains('open')) return;
        e.preventDefault();
        if (scrolling) return;
        accumulated += Math.abs(e.deltaY);
        if (accumulated > 20) {
            scrolling = true; accumulated = 0;
            const max = window._maxIdx || 2;
            if (e.deltaY > 0 && currentIdx < max) currentIdx++;
            else if (e.deltaY < 0 && currentIdx > 0) currentIdx--;
            update();
            setTimeout(() => { scrolling = false; accumulated = 0; }, 900);
        }
    }, {passive: false});
}

window.toggleSideMenu = function() {
    document.getElementById('sideMenu').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
};
window.closeSideMenu = function() {
    document.getElementById('sideMenu').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
};
document.getElementById('overlay').addEventListener('click', closeSideMenu);

document.querySelectorAll('.pc-only').forEach(el => { if(isMobile) el.style.display = 'none'; });
document.querySelectorAll('.mobile-only').forEach(el => { if(!isMobile) el.style.display = 'none'; });

window.closePopup = function() {
    document.getElementById('popup-wrap').classList.remove('open');
    document.getElementById('popup-overlay').classList.remove('open');
    if (!isMobile) {
        setTimeout(() => {
            document.getElementById('heroTextContainer').classList.add('bouncing');
            document.getElementById('pc-scroll-hint').classList.add('visible');
        }, 2000);
    }
};
window.hidePopup1h = function() {
    localStorage.setItem('popupHideUntil', Date.now() + 60 * 60 * 1000);
    closePopup();
};
const popupHideUntil = localStorage.getItem('popupHideUntil');
if (!popupHideUntil || Date.now() > parseInt(popupHideUntil)) {
    setTimeout(() => {
        document.getElementById('popup-wrap').classList.add('open');
        document.getElementById('popup-overlay').classList.add('open');

}

const pcSlides = document.querySelectorAll('.pc-slide');
const mobileSlides = document.querySelectorAll('.mobile-slide');
let slideIdx = 0;
setInterval(() => {
    pcSlides[slideIdx].classList.remove('active');

    slideIdx = (slideIdx + 1) % pcSlides.length;
    pcSlides[slideIdx].classList.add('active');
    mobileSlides[slideIdx].classList.add('active');
}, 10000);

const bgm = document.getElementById('bgm');
bgm.volume = 0;
const MAX_VOL = 0.15;
function fadeIn() {
    let vol = 0;
    const t = setInterval(() => { vol = Math.min(vol + MAX_VOL/30, MAX_VOL); bgm.volume = vol; if(vol >= MAX_VOL) clearInterval(t); }, 100);
}
bgm.addEventListener('ended', () => { bgm.currentTime = 0; bgm.play(); fadeIn(); });
document.addEventListener('click', () => { bgm.play().then(() => fadeIn()).catch(() => {}); }, { once: true });

let muted = false;
window.toggleMute = function() {
    muted = !muted;
    bgm.volume = muted ? 0 : MAX_VOL;

// 관리자

    typedBuffer += e.key;

function renderAdminPanels() {
    // 홈 이미지
    const homeList = document.getElementById('home-slides-list');
    homeList.innerHTML = '';
    siteData.homeSlides.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'slide-item';

            <span class="slide-label">슬라이드 ${i+1}</span>

    });

    // 입시결과
    const admList = document.getElementById('admission-year-list');
    admList.innerHTML = '';
    siteData.admissionYears.forEach((y, i) => {
        const div = document.createElement('div');
        div.className = 'year-item';
        div.innerHTML = `
            <input style="width:60px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white;padding:6px;font-size:14px;" id="adm-year-${i}" value="${y.year}" type="number">
            <input type="color" class="color-input" id="adm-color-${i}" value="${y.color}">
            <div style="display:flex;flex-direction:column;gap:4px;flex:1;">
                <div class="input-group">
                    <div class="input-label">PC 이미지 링크</div>
                    <input class="url-input" id="adm-url-${i}" value="${y.admissionUrl || ''}" placeholder="PC 이미지 링크">
                </div>
                <div class="input-group">
                    <div class="input-label">모바일 이미지 링크</div>
                    <input class="url-input" id="adm-mobile-${i}" value="${y.admissionMobileUrl || ''}" placeholder="모바일 이미지 링크">
                </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:2px;">
                <button class="order-btn" onclick="moveAdmYear(${i},-1)">▲</button>
                <button class="order-btn" onclick="moveAdmYear(${i},1)">▼</button>
            </div>
            <button class="del-btn" onclick="removeAdmYear(${i})">×</button>`;
        admList.appendChild(div);
    });

    // 장학금 입력
    renderScholarshipInputs();

    // 팝업
    document.getElementById('popup-visible').checked = siteData.popupVisible !== false;
    document.getElementById('popup-img-url').value = siteData.popupImageUrl || 'https://i.imgur.com/21CdYDt.png';
    document.getElementById('popup-btn-text').value = siteData.popupBtnText || '자세히 알아보기';
    document.getElementById('popup-btn-link').value = siteData.popupBtnLink || 'notice.html';

    // 공지사항
    renderNoticeList();

function renderScholarshipInputs() {
    const tabs = document.getElementById('sch-year-tabs');
    if (tabs) {
        tabs.innerHTML = '';
        siteData.admissionYears.forEach(y => {
            if (!siteData[`scholarship_${y.year}`]) siteData[`scholarship_${y.year}`] = {};
            const btn = document.createElement('button');
            btn.className = 'save-btn';
            btn.id = `sch-tab-${y.year}`;
            btn.style.cssText = `opacity:${y.year === currentSchYear ? '1' : '0.4'};margin-top:0;`;
            btn.textContent = String(y.year);
            btn.onclick = () => selectSchYear(y.year);
            tabs.appendChild(btn);
        });
    }
    const yearKey = `scholarship_${currentSchYear}`;
    if (!siteData[yearKey]) siteData[yearKey] = {};
    const data = siteData[yearKey];
    const entries = Object.entries(data);
    const list = document.getElementById('scholarship-input-list');
    if (!list) return;
    list.innerHTML = '';
    entries.forEach(([country, d], i) => {
        const div = document.createElement('div');
        div.className = 'sch-country-row';
        div.innerHTML = `
            <input style="width:80px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white;padding:6px;font-size:14px;" id="sch-name-${i}" value="${country}" placeholder="나라명">
            <div class="input-group">
                <div class="input-label">원 (₩)</div>
                <input class="url-input" id="sch-krw-${i}" value="${d.krw || 0}" type="number" placeholder="0">
            </div>
            <div class="input-group">
                <div class="input-label">달러 ($)</div>
                <input class="url-input" id="sch-usd-${i}" value="${d.usd || 0}" type="number" placeholder="0">
            </div>
            <div class="input-group">
                <div class="input-label">국기 이미지 링크</div>
                <input class="url-input" id="sch-flag-${i}" value="${d.flag || ''}" placeholder="이미지 링크">
            </div>
            <div style="display:flex;flex-direction:column;gap:2px;">
                <button class="order-btn" onclick="moveSchCountry(${i},-1)">▲</button>
                <button class="order-btn" onclick="moveSchCountry(${i},1)">▼</button>
            </div>
            <button class="del-btn" onclick="removeSchCountry(${i})">×</button>`;
        list.appendChild(div);
    });
}

function collectSchCountryData() {
    const yearKey = `scholarship_${currentSchYear}`;
    const entries = Object.entries(siteData[yearKey] || {});
    const newData = {};
    entries.forEach((_, i) => {
        const name = document.getElementById(`sch-name-${i}`)?.value;
        const krw = parseInt(document.getElementById(`sch-krw-${i}`)?.value) || 0;
        const usd = parseInt(document.getElementById(`sch-usd-${i}`)?.value) || 0;
        const flag = document.getElementById(`sch-flag-${i}`)?.value || '';
        if (name) newData[name] = { krw, usd, flag };
    });
    siteData[yearKey] = newData;
}

window.moveSchCountry = function(i, dir) {
    collectSchCountryData();
    const yearKey = `scholarship_${currentSchYear}`;
    const entries = Object.entries(siteData[yearKey]);
    const j = i + dir;
    if (j < 0 || j >= entries.length) return;
    [entries[i], entries[j]] = [entries[j], entries[i]];
    siteData[yearKey] = Object.fromEntries(entries);
    renderScholarshipInputs();
};

window.removeSchCountry = function(i) {
    collectSchCountryData();
    const yearKey = `scholarship_${currentSchYear}`;
    const entries = Object.entries(siteData[yearKey]);
    entries.splice(i, 1);
    siteData[yearKey] = Object.fromEntries(entries);
    renderScholarshipInputs();
};

window.addSchCountry = function() {
    collectSchCountryData();
    const yearKey = `scholarship_${currentSchYear}`;
    if (!siteData[yearKey]) siteData[yearKey] = {};
    siteData[yearKey]['새 나라'] = { krw: 0, usd: 0 };
    renderScholarshipInputs();
};

window.selectSchYear = function(year) {
    currentSchYear = year;
    document.querySelectorAll('[id^="sch-tab-"]').forEach(b => b.style.opacity = '0.4');
    document.getElementById(`sch-tab-${year}`).style.opacity = '1';
    renderScholarshipInputs();
};

function collectAdmData() {
    siteData.admissionYears = siteData.admissionYears.map((y, i) => ({
        year: parseInt(document.getElementById(`adm-year-${i}`)?.value) || y.year,
        color: document.getElementById(`adm-color-${i}`)?.value || y.color,
        admissionUrl: document.getElementById(`adm-url-${i}`)?.value || '',
        admissionMobileUrl: document.getElementById(`adm-mobile-${i}`)?.value || ''
    }));
}

window.moveHomeSlide = function(i, dir) {
    const j = i + dir;
    if (j < 0 || j >= siteData.homeSlides.length) return;
    [siteData.homeSlides[i], siteData.homeSlides[j]] = [siteData.homeSlides[j], siteData.homeSlides[i]];
    renderAdminPanels();
};
window.moveAdmYear = function(i, dir) {
    collectAdmData();
    const j = i + dir;
    if (j < 0 || j >= siteData.admissionYears.length) return;
    [siteData.admissionYears[i], siteData.admissionYears[j]] = [siteData.admissionYears[j], siteData.admissionYears[i]];
    renderAdminPanels();
};
window.addHomeSlide = function() { siteData.homeSlides.push({ url: '' }); renderAdminPanels(); };
window.removeHomeSlide = function(i) { siteData.homeSlides.splice(i, 1); renderAdminPanels(); };
window.addAdmissionYear = function() { collectAdmData(); siteData.admissionYears.push({ year: new Date().getFullYear(), color: '#333333', admissionUrl: '', admissionMobileUrl: '' }); renderAdminPanels(); };
window.removeAdmYear = function(i) { collectAdmData(); siteData.admissionYears.splice(i, 1); renderAdminPanels(); };

window.saveHomeImages = async function() {
    siteData.homeSlides = siteData.homeSlides.map((s, i) => ({ url: document.getElementById(`home-slide-${i}`)?.value || s.url }));
    await saveToFirebase(); alert('저장됐어!');
};
window.saveAdmission = async function() {
    collectAdmData(); await saveToFirebase(); renderSections(); renderSideNav(); alert('저장됐어!');
};
window.saveScholarshipData = async function() {
    collectSchCountryData();
    // 현재 순서 배열 저장
    const yearKey = `scholarship_${currentSchYear}`;
    siteData[`scholarshipOrder_${currentSchYear}`] = Object.keys(siteData[yearKey] || {});
    await saveToFirebase();
    alert('저장됐어!');
};

function loadRecentColors(key) {
    try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function saveRecentColors(key, arr) {
    localStorage.setItem(key, JSON.stringify(arr));
}
const recentFgColors = loadRecentColors('recentFgColors');
const recentHlColors = loadRecentColors('recentHlColors');

function addRecentColor(arr, color, storageKey) {
    const filtered = arr.filter(c => c !== color);
    filtered.unshift(color);
    if (filtered.length > 5) filtered.pop();
    arr.length = 0;
    arr.push(...filtered);
    saveRecentColors(storageKey, arr);
}

function renderRecentColors(containerId, arr, cmd) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = '';
    arr.forEach(c => {
        const btn = document.createElement('div');
        btn.className = 'recent-color-btn';
        btn.style.background = c;
        btn.title = c;
        btn.onclick = () => {
            const idx = containerId.split('-')[2];
            document.getElementById(`notice-body-${idx}`).focus();
            document.execCommand(cmd, false, c);
        };
        el.appendChild(btn);
    });
}

function renderNoticeList() {
    const list = document.getElementById('notice-list');
    if (!list) return;
    list.innerHTML = '';
    (siteData.notices || []).forEach((n, i) => {

        div.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                <span style="font-size:13px;color:rgba(255,255,255,0.6);">공지사항 ${i+1}</span>
                <div style="display:flex;gap:4px;">
                    <button class="order-btn" onclick="moveNotice(${i},-1)">▲</button>
                    <button class="order-btn" onclick="moveNotice(${i},1)">▼</button>
                    <button class="del-btn" onclick="removeNotice(${i})">×</button>
                </div>
            </div>
            <input class="url-input" id="notice-title-${i}" value="${n.title || ''}" placeholder="제목" style="width:100%;margin-bottom:8px;">
            <div class="notice-content-editor" id="notice-body-${i}" contenteditable="true">${n.content || ''}</div>`;
        list.appendChild(div);
        renderRecentColors(`recent-fg-${i}`, recentFgColors, 'foreColor');
        renderRecentColors(`recent-hl-${i}`, recentHlColors, 'hiliteColor');
    });
}
let savedSel = null;

function saveSelection() {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) savedSel = sel.getRangeAt(0).cloneRange();
}

function restoreSelection() {
    if (!savedSel) return;
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedSel);
}

function checkHlState(range) {
    if (!range) return false;
    const el = range.commonAncestorContainer.nodeType === 3
        ? range.commonAncestorContainer.parentElement
        : range.commonAncestorContainer;
    const bg = window.getComputedStyle(el).backgroundColor;
    return bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent' && bg !== 'rgb(255, 255, 255)';
}

const PRESET_COLORS = ['#ff0000','#ff8800','#ffff00','#00cc00','#0066ff','#000080','#8800cc','#000000'];

// 서브메뉴 호버 딜레이 처리
function setupColorSubMenu(btnId, subId) {
    const btn = document.getElementById(btnId);
    const sub = document.getElementById(subId);
    if (!btn || !sub) return;
    let hideTimer = null;
    const show = () => { clearTimeout(hideTimer); sub.classList.add('visible'); };
    const hide = () => { hideTimer = setTimeout(() => sub.classList.remove('visible'), 150); };
    btn.addEventListener('mouseenter', show);
    btn.addEventListener('mouseleave', hide);
    sub.addEventListener('mouseenter', show);
    sub.addEventListener('mouseleave', hide);
    sub.querySelectorAll('.ft-pick-hover-guard').forEach(g => {
        g.addEventListener('mouseenter', show);
        g.addEventListener('mouseleave', hide);
    });
}
setupColorSubMenu('ft-fg-btn', 'ft-fg-sub');
setupColorSubMenu('ft-hl-btn', 'ft-hl-sub');

function renderFtPresets() {
    const fgPre = document.getElementById('ft-fg-presets');
    const hlPre = document.getElementById('ft-hl-presets');
    if (!fgPre || !hlPre) return;
    fgPre.innerHTML = ''; hlPre.innerHTML = '';
    PRESET_COLORS.forEach(c => {
        const b1 = document.createElement('div');
        b1.className = 'ft-preset-btn';
        b1.style.background = c;
        b1.onmousedown = (e) => { e.preventDefault(); restoreSelection(); document.execCommand('foreColor', false, c); saveSelection(); addRecentColor(recentFgColors, c, 'recentFgColors'); renderFtRecent(); };
        fgPre.appendChild(b1);
        const b2 = document.createElement('div');
        b2.className = 'ft-preset-btn';
        b2.style.background = c;
        b2.onmousedown = (e) => { e.preventDefault(); restoreSelection(); document.execCommand('hiliteColor', false, c); saveSelection(); addRecentColor(recentHlColors, c, 'recentHlColors'); renderFtRecent(); document.getElementById('ft-hl-btn').classList.add('hl-on'); };
        hlPre.appendChild(b2);
    });
}

function renderFtRecent() {
    const fgRec = document.getElementById('ft-fg-recent');
    const hlRec = document.getElementById('ft-hl-recent');
    if (!fgRec || !hlRec) return;
    fgRec.innerHTML = ''; hlRec.innerHTML = '';
    recentFgColors.forEach(c => {
        const b = document.createElement('div');
        b.className = 'ft-recent-btn';
        b.style.background = c;
        b.onmousedown = (e) => { e.preventDefault(); restoreSelection(); document.execCommand('foreColor', false, c); saveSelection(); };
        fgRec.appendChild(b);
    });
    recentHlColors.forEach(c => {
        const b = document.createElement('div');
        b.className = 'ft-recent-btn';
        b.style.background = c;
        b.onmousedown = (e) => { e.preventDefault(); restoreSelection(); document.execCommand('hiliteColor', false, c); saveSelection(); document.getElementById('ft-hl-btn').classList.add('hl-on'); };
        hlRec.appendChild(b);
    });
}

// 플로팅 툴바
const ftBar = document.getElementById('float-toolbar');
renderFtPresets();
renderFtRecent();

document.addEventListener('mouseup', (e) => {
    if (e.target.closest('#float-toolbar')) return;
    setTimeout(() => {
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed || sel.rangeCount === 0) { ftBar.style.display = 'none'; return; }
        const range = sel.getRangeAt(0);
        const node = range.commonAncestorContainer;
        const inEditor = (node.nodeType === 3 ? node.parentElement : node).closest('.notice-content-editor');
        if (!inEditor) { ftBar.style.display = 'none'; return; }
        saveSelection();
        renderFtRecent();
        const rect = range.getBoundingClientRect();
        const hlOn = checkHlState(range);
        document.getElementById('ft-hl-btn').classList.toggle('hl-on', hlOn);
        ftBar.style.display = 'flex';
        ftBar.style.left = Math.max(4, rect.left + rect.width / 2 - 100) + 'px';
        ftBar.style.top = (rect.top + window.scrollY - 48) + 'px';
    }, 10);
});

document.addEventListener('mousedown', (e) => {
    if (!e.target.closest('#float-toolbar') && !e.target.closest('.notice-content-editor')) {
        ftBar.style.display = 'none';
    }
});

document.getElementById('ft-bold').onmousedown = (e) => { e.preventDefault(); restoreSelection(); document.execCommand('bold'); saveSelection(); };
document.getElementById('ft-italic').onmousedown = (e) => { e.preventDefault(); restoreSelection(); document.execCommand('italic'); saveSelection(); };
document.getElementById('ft-under').onmousedown = (e) => { e.preventDefault(); restoreSelection(); document.execCommand('underline'); saveSelection(); };

document.getElementById('ft-hl-btn').onmousedown = (e) => {
    e.preventDefault();
    restoreSelection();
    const hlBtn = document.getElementById('ft-hl-btn');
    if (hlBtn.classList.contains('hl-on')) {
        document.execCommand('hiliteColor', false, 'transparent');
        hlBtn.classList.remove('hl-on');
    } else {
        const color = recentHlColors[0] || '#ffff00';
        document.execCommand('hiliteColor', false, color);
        addRecentColor(recentHlColors, color, 'recentHlColors');
        renderFtRecent();
        hlBtn.classList.add('hl-on');
    }
    saveSelection();
};

document.getElementById('ft-fg-pick').oninput = (e) => {
    restoreSelection();
    document.execCommand('foreColor', false, e.target.value);
    saveSelection();
    addRecentColor(recentFgColors, e.target.value, 'recentFgColors');
    renderFtRecent();
};

document.getElementById('ft-hl-pick').oninput = (e) => {
    restoreSelection();
    document.execCommand('hiliteColor', false, e.target.value);
    saveSelection();
    addRecentColor(recentHlColors, e.target.value, 'recentHlColors');
    renderFtRecent();
    document.getElementById('ft-hl-btn').classList.add('hl-on');
};
// 링크 감지 모달
let pendingLinkData = null;

function showLinkModal(url, range, editor) {
    pendingLinkData = { url, range, editor };
    let modal = document.getElementById('link-suggest-modal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'link-suggest-modal';
        modal.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#2a2a2a;border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:24px 28px;z-index:99999999;color:white;min-width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.6);';
        modal.innerHTML = `
            <div style="font-size:14px;margin-bottom:8px;color:rgba(255,255,255,0.6);">링크가 감지되었습니다</div>
            <div id="link-modal-url" style="font-size:13px;color:#66aaff;word-break:break-all;margin-bottom:20px;"></div>
            <div style="display:flex;gap:10px;justify-content:flex-end;">
                <button onclick="dismissLink()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:8px 18px;cursor:pointer;border-radius:6px;font-size:13px;">적용 안함</button>
                <button onclick="applyLink()" style="background:#0066ff;border:none;color:white;padding:8px 18px;cursor:pointer;border-radius:6px;font-size:13px;">링크로 연결</button>
            </div>`;
        document.body.appendChild(modal);
    }
    document.getElementById('link-modal-url').textContent = url;
    modal.style.display = 'block';
}

window.applyLink = function() {
    if (!pendingLinkData) return;
    const { url, range, editor } = pendingLinkData;
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('createLink', false, url);
    // 새 탭에서 열리도록
    editor.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
    pendingLinkData = null;
    document.getElementById('link-suggest-modal').style.display = 'none';
};

window.dismissLink = function() {
    pendingLinkData = null;
    document.getElementById('link-suggest-modal').style.display = 'none';
};

// 에디터 링크 감지
document.addEventListener('input', (e) => {
    const editor = e.target.closest('.notice-content-editor');
    if (!editor) return;
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const range = sel.getRangeAt(0);
    const node = range.startContainer;
    if (node.nodeType !== 3) return;
    const text = node.textContent;
    const offset = range.startOffset;
    // 커서 앞 텍스트에서 URL 찾기
    const before = text.substring(0, offset);
    const urlMatch = before.match(/(https?:\/\/[^\s]+)$/);
    if (urlMatch) {
        const url = urlMatch[1];
        // 이미 링크 안에 있으면 스킵
        if (node.parentElement.tagName === 'A') return;
        // URL 범위 선택
        const linkRange = document.createRange();
        linkRange.setStart(node, offset - url.length);
        linkRange.setEnd(node, offset);
        showLinkModal(url, linkRange, editor);
    }
});

function collectNoticeData() {
    siteData.notices = (siteData.notices || []).map((n, i) => ({
        title: document.getElementById(`notice-title-${i}`)?.value || '',
        content: document.getElementById(`notice-body-${i}`)?.innerHTML || ''
    }));
}
window.addNotice = function() {
    collectNoticeData();
    if (!siteData.notices) siteData.notices = [];
    siteData.notices.push({ title: '', content: '' });
    renderNoticeList();
};
window.removeNotice = function(i) {
    collectNoticeData();
    siteData.notices.splice(i, 1);
    renderNoticeList();
};
window.moveNotice = function(i, dir) {
    collectNoticeData();
    const j = i + dir;
    if (j < 0 || j >= siteData.notices.length) return;
    [siteData.notices[i], siteData.notices[j]] = [siteData.notices[j], siteData.notices[i]];
    renderNoticeList();
};
window.savePopup = async function() {
    siteData.popupVisible = document.getElementById('popup-visible').checked;
    siteData.popupImageUrl = document.getElementById('popup-img-url').value;
    siteData.popupBtnText = document.getElementById('popup-btn-text').value;
    siteData.popupBtnLink = document.getElementById('popup-btn-link').value;
    await saveToFirebase();
    document.getElementById('popup-img').src = siteData.popupImageUrl;
    document.getElementById('popup-more').textContent = siteData.popupBtnText;
    document.getElementById('popup-more').onclick = () => location.href = siteData.popupBtnLink;
    alert('저장됐어!');
};
window.saveNotices = async function() {
    collectNoticeData();
    await saveToFirebase();
    alert('저장됐어!');
};

async function saveToFirebase() {
    try { await setDoc(doc(db, 'config', 'siteData'), siteData); }
    catch(e) { alert('저장 실패: ' + e.message); }
}

loadData();
</script>
