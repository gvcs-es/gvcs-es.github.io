<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 글로벌선진학교 음성캠퍼스</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --gvcs-red: #9a1e23; /* 보내주신 시그니처 레드 */
            --text-dark: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #000; /* 페이드아웃 될 때 아래 깔릴 암전 배경 */
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }

        /* 스크롤 감지를 위한 전체 컨테이너 세팅 (애플식 스냅 스크롤 구현) */
        .scroll-container {
            width: 100%;
            position: relative;
        }

        /* 1번 메인 전경 (고정 섹션) */
        #hero {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), 
                        url('https://raw.githubusercontent.com/gvcs-es/gvcs-es.github.io/main/GVCS%20%E1%84%8C%E1%85%A5%E1%86%AB%E1%84%80%E1%85%A7%E1%86%BC%20%E1%84%87%E1%85%A9%E1%84%8C%E1%85%A5%E1%86%BC.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            will-change: opacity, transform;
            transition: opacity 0.1s linear, transform 0.1s linear;
        }

        #hero h1 {
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            color: white;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* 2번 아래에서 올라오는 입시 결과 섹션 공간 (스크롤 트리거 역할) */
        .results-trigger {
            width: 100%;
            height: 100vh; /* 첫 스크롤 시 흐려지는 타이밍을 버텨줄 가상 공간 */
            position: relative;
            z-index: 2;
            pointer-events: none; /* 마우스 이벤트 통과 */
        }

        /* 진짜 위로 덮어쓰며 올라오는 빨간색 판때기 */
        #results-cta {
            position: relative;
            z-index: 3;
            background-color: var(--gvcs-red);
            color: white;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: 0 -20px 50px rgba(0, 0, 0, 0.5);
        }

        .cta-content {
            padding: 100px 60px 100px 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .cta-content h2 {
            font-size: clamp(36px, 5vw, 64px);
            font-weight: 900;
            line-height: 1.25;
            letter-spacing: -2px;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        .cta-btn {
            display: inline-block;
            width: fit-content;
            padding: 22px 50px;
            background-color: white;
            color: var(--gvcs-red);
            text-decoration: none;
            font-weight: 700;
            font-size: 22px;
            border-radius: 0px; /* 완벽한 정사각형 블록 감성 */
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .cta-image {
            background: linear-gradient(rgba(154, 30, 35, 0.15), rgba(154, 30, 35, 0.15)),
                        url('https://raw.githubusercontent.com/gvcs-es/gvcs-es.github.io/main/GVCS%20%E1%84%8C%E1%85%A5%E1%86%AB%E1%84%80%E1%85%A7%E1%86%BC%20%E1%84%87%E1%85%A9%E1%84%8C%E1%85%A5%E1%86%BC.jpg') center/cover no-repeat;
            min-height: 600px;
        }

        /* 3번 하단 정보 공간 */
        #contact {
            position: relative;
            z-index: 4;
            min-height: 50vh;
            background-color: #111827;
            color: white;
            padding: 100px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        #contact h3 {
            font-size: 28px;
            font-weight: 900;
            color: var(--gvcs-red);
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 50px;
            width: 100%;
        }

        .contact-item h4 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #f3f4f6;
            letter-spacing: 1px;
        }

        .contact-item p {
            font-size: 16px;
            color: #9ca3af;
            font-weight: 300;
        }

        @media (max-width: 1024px) {
            #results-cta { grid-template-columns: 1fr; }
            .cta-content { padding: 60px 40px; text-align: center; align-items: center; }
            .cta-content h2 { text-align: center; }
            .cta-image { min-height: 400px; }
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <section id="hero">
            <h1>GVCS EUMSEONG</h1>
        </section>

        <div class="results-trigger"></div>

        <section id="results-cta">
            <div class="cta-content">
                <h2>글로벌선진학교<br>대학 입시 결과<br>확인하러 가기</h2>
                <a href="#" class="cta-btn">결과 확인하기 <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></a>
            </div>
            <div class="cta-image"></div>
        </section>

        <section id="contact">
            <h3>CONTACT INFO</h3>
            <div class="contact-grid">
                <div class="contact-item">
                    <h4>LOCATION</h4>
                    <p>충청북도 음성군 원남면 원중로 406-9</p>
                </div>
                <div class="contact-item">
                    <h4>PHONE</h4>
                    <p>대표번호: 043-871-7000<br>입학문의: 1588-9147</p>
                </div>
                <div class="contact-item">
                    <h4>ONLINE</h4>
                    <p>admissions@gvcs-es.org<br>www.gvcs-es.org</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        window.addEventListener('scroll', () => {
            const hero = document.getElementById('hero');
            const scrollY = window.scrollY;
            const viewportHeight = window.innerHeight;

            // 첫 번째 화면 높이 범위 안에서 스크롤될 때 투명도와 스케일 연출
            if (scrollY <= viewportHeight) {
                const progress = scrollY / viewportHeight;
                hero.style.opacity = 1 - progress; 
                hero.style.transform = `scale(${1 - (progress * 0.05)})`;
                hero.style.visibility = 'visible';
            } else {
                hero.style.opacity = 0;
                hero.style.visibility = 'hidden';
            }
        });
    </script>

</body>
</html>
