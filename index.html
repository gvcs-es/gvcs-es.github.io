<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 글로벌선진학교 음성캠퍼스</title>
    <style>
        :root { --gvcs-red: #9a1e23; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #000; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }

        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 150px; 
            display: flex; justify-content: space-between; align-items: center;
            /* 📌 좌우 여백 20px 유지 */
            padding: 0 20px; z-index: 9999;
            /* 📌 세로 범위를 길게 늘리기 위해 0~100%까지의 그라데이션 완만하게 조정 */
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
            transition: background 0.5s ease;
            /* 로고와 메뉴가 상단에 붙도록 정렬 */
            align-items: flex-start;
            padding-top: 20px;
        }
        .header-bar.scrolled { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); }
        
        .header-logo { height: 50px; display: flex; align-items: center; z-index: 10000; }
        .header-logo img { height: 50px; width: auto; }
        
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 6px; z-index: 10000; }
        .menu-btn span { display: block; width: 30px; height: 2px; background: white; border-radius: 2px; }

        .main-wrapper { width: 100%; height: 100%; position: relative; }
        .page-section { width: 100%; height: 100vh; position: absolute; top: 0; left: 0; transition: transform 1.4s cubic-bezier(0.16, 1, 0.3, 1); }

        #section-hero { z-index: 1; background: url('https://i.imgur.com/BCMjATY.png') center/cover no-repeat; position: relative; }
        
        /* 📌 텍스트 이미지 배치: 기존 구조 유지 */
        .hero-text-container {
            position: absolute; 
            bottom: 30px; 
            left: 30px; 
            display: flex; 
            flex-direction: row; 
            align-items: flex-end; 
            gap: 15px; /* 시각적 밸런스를 위해 간격 미세 조정 */
        }
        
        /* 📌 분석된 시각적 비율을 반영하여 동일 높이로 설정 */
        .img-gvcs { height: 10px; width: auto; }
.img-sub { height: 90px; width: auto; align-self: flex-end; margin-bottom: 10px; }

        #section-results { z-index: 2; background: var(--gvcs-red); transform: translateY(100vh); display: flex; align-items: center; padding: 100px; color: white; }
    </style>
</head>
<body>
    <header class="header-bar" id="navbar">
        <a href="#" class="header-logo">
            <img src="https://i.imgur.com/fgXI0Gf.png" alt="Logo">
        </a>
        <div class="menu-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <div class="main-wrapper">
        <div id="section-hero" class="page-section">
            <div class="hero-text-container">
                <img src="https://i.imgur.com/vJ66HlC.png" alt="GVCS" class="img-gvcs">
                <img src="https://i.imgur.com/u7yzlre.png" alt="GLOBAL VISION CHRISTIAN SCHOOL" class="img-sub">
            </div>
        </div>
        <div id="section-results" class="page-section">
            <h2>입시 결과 확인 페이지</h2>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        const sections = document.querySelectorAll('.page-section');
        const navbar = document.getElementById('navbar');
        window.addEventListener('wheel', (e) => {
            if(Math.abs(e.deltaY) > 35) {
                if(e.deltaY > 0 && currentIdx < 1) currentIdx++;
                else if(e.deltaY < 0 && currentIdx > 0) currentIdx--;
                update();
            }
        }, {passive: false});

        function update() {
            sections[1].style.transform = currentIdx === 1 ? 'translateY(0)' : 'translateY(100vh)';
            if(currentIdx > 0) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        }
    </script>
</body>
</html>
