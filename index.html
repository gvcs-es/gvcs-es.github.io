<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 글로벌선진학교 음성캠퍼스</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --gvcs-red: #9a1e23; /* 보내주신 시그니처 레드 */
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
        }

        section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 섹션 1: 메인 전경 화면 */
        #hero {
            background: linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), 
                        url('https://raw.githubusercontent.com/gvcs-es/gvcs-es.github.io/main/GVCS%20%E1%84%8C%E1%85%A5%E1%86%AB%E1%84%80%E1%85%A7%E1%86%BC%20%E1%84%87%E1%85%A9%E1%84%8C%E1%85%A5%E1%86%BC.jpg') center/cover no-repeat;
            background-attachment: fixed;
        }

        #hero h1 {
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            color: white;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* 섹션 2: 대학 입시 결과 섹션 (#9a1e23 색상 채우기 + 정사각형 느낌) */
        #results-cta {
            background-color: var(--gvcs-red);
            color: white;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .cta-content {
            padding: 100px 60px 100px 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .cta-content h2 {
            font-size: clamp(36px, 5vw, 64px);
            font-weight: 900;
            line-height: 1.25;
            letter-spacing: -2px;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        .cta-btn {
            display: inline-block;
            width: fit-content;
            padding: 22px 50px;
            background-color: white;
            color: var(--gvcs-red);
            text-decoration: none;
            font-weight: 700;
            font-size: 22px;
            border-radius: 0px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .cta-image {
            background: linear-gradient(rgba(154, 30, 35, 0.1), rgba(154, 30, 35, 0.1)),
                        url('https://raw.githubusercontent.com/gvcs-es/gvcs-es.github.io/main/GVCS%20%E1%84%8C%E1%85%A5%E1%86%AB%E1%84%80%E1%85%A7%E1%86%BC%20%E1%84%87%E1%85%A9%E1%84%8C%E1%85%A5%E1%86%BC.jpg') center/cover no-repeat;
            min-height: 600px;
        }

        /* 섹션 3: 하단 정보 공간 */
        #contact {
            min-height: 50vh;
            background-color: #111827;
            color: white;
            padding: 100px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        #contact h3 {
            font-size: 28px;
            font-weight: 900;
            color: var(--gvcs-red);
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 50px;
            width: 100%;
        }

        .contact-item h4 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #f3f4f6;
            letter-spacing: 1px;
        }

        .contact-item p {
            font-size: 16px;
            color: #9ca3af;
            font-weight: 300;
        }

        @media (max-width: 1024px) {
            #results-cta { grid-template-columns: 1fr; }
            .cta-content { padding: 60px 40px; text-align: center; align-items: center; }
            .cta-content h2 { text-align: center; }
            .cta-image { min-height: 400px; }
        }
    </style>
</head>
<body>

    <section id="hero">
        <h1>GVCS EUMSEONG</h1>
    </section>

    <section id="results-cta">
        <div class="cta-content">
            <h2>글로벌선진학교<br>대학 입시 결과<br>확인하러 가기</h2>
            <a href="#" class="cta-btn">결과 확인하기 <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></a>
        </div>
        <div class="cta-image"></div>
    </section>

    <section id="contact">
        <h3>CONTACT INFO</h3>
        <div class="contact-grid">
            <div class="contact-item">
                <h4>LOCATION</h4>
                <p>충청북도 음성군 원남면 원중로 406-9</p>
            </div>
            <div class="contact-item">
                <h4>PHONE</h4>
                <p>대표번호: 043-871-7000<br>입학문의: 1588-9147</p>
            </div>
            <div class="contact-item">
                <h4>ONLINE</h4>
                <p>admissions@gvcs-es.org<br>www.gvcs-es.org</p>
            </div>
        </div>
    </section>

</body>
</html>
