<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 글로벌선진학교 음성캠퍼스</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --gvcs-red: #9a1e23;
            --text-dark: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden; /* 강제 스냅 스크롤 제어를 위해 기본 스크롤바 숨김 */
        }

        /* --------------------------------------------------
           🖼️ 상단 네비게이션 바 (고정)
        -------------------------------------------------- */
        .header-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background-color: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 9999;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-logo {
            height: 40px;
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .header-logo img {
            height: 100%;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .header-menu {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .header-menu a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .header-menu a:hover {
            color: white;
        }

        /* --------------------------------------------------
           🍏 애플 스타일 스무스 트랜지션 레이아웃 (Contact 제거)
        -------------------------------------------------- */
        .main-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .page-section {
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            /* ⏳ 0.8초 -> 1.4초로 대폭 늘려 묵직하고 고급스럽게 연출 (애플 감성 큐빅 베지에) */
            transition: transform 1.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.4s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, opacity;
        }

        /* [섹션 1] 메인 전경 화면 */
        #section-hero {
            z-index: 1;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://raw.githubusercontent.com/gvcs-es/gvcs-es.github.io/main/GVCS%20%E1%84%8C%E1%85%A5%E1%86%AB%E1%84%80%E1%85%A7%E1%86%BC%20%E1%84%87%E1%85%A9%E1%84%8C%E1%85%A5%E1%86%BC.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #section-hero h1 {
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            color: white;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* [섹션 2] 아래에서 진중하게 치고 올라올 입시 결과 섹션 */
        #section-results {
            z-index: 3;
            background-color: var(--gvcs-red);
            color: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            transform: translateY(100vh); /* 처음에 하단 대기 */
            box-shadow: 0 -30px 60px rgba(0, 0, 0, 0.5);
        }

        .cta-content {
            padding: 100px 60px 100px 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .cta-content h2 {
            font-size: clamp(36px, 5vw, 64px);
            font-weight: 900;
            line-height: 1.25;
            letter-spacing: -2px;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        .cta-btn {
            display: inline-block;
            width: fit-content;
            padding: 22px 50px;
            background-color: white;
            color: var(--gvcs-red);
            text-decoration: none;
            font-weight: 700;
            font-size: 22px;
            border-radius: 0px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .cta-image {
            background: linear-gradient(rgba(154, 30, 35, 0.2), rgba(154, 30, 35, 0.2)),
                        url('https://raw.githubusercontent.com/gvcs-es/gvcs-es.github.io/main/GVCS%20%E1%84%8C%E1%85%A5%E1%86%AB%E1%84%80%E1%85%A7%E1%86%BC%20%E1%84%87%E1%85%A9%E1%84%8C%E1%85%A5%E1%86%BC.jpg') center/cover no-repeat;
        }

        @media (max-width: 1024px) {
            html, body { overflow-y: auto; height: auto; }
            .page-section { position: relative; height: auto; min-height: 100vh; transform: none !important; opacity: 1 !important; }
            #section-results { grid-template-columns: 1fr; }
            .cta-content { padding: 80px 40px; text-align: center; align-items: center; }
            .cta-image { min-height: 300px; }
        }
    </style>
</head>
<body>

    <header class="header-bar">
        <a href="#" class="header-logo">
            <img src="https://raw.githubusercontent.com/gvcs-es/gvcs-es.github.io/main/KakaoTalk_Image_2026-04-03-14-58-55_003.png" alt="GVCS Logo">
        </a>
        <ul class="header-menu">
            <li><a href="javascript:void(0);" onclick="goToSection(0)">HOME</a></li>
            <li><a href="javascript:void(0);" onclick="goToSection(1)">입시결과</a></li>
        </ul>
    </header>

    <div class="main-wrapper">
        
        <div id="section-hero" class="page-section">
            <h1>GVCS EUMSEONG</h1>
        </div>

        <div id="section-results" class="page-section">
            <div class="cta-content">
                <h2>글로벌선진학교<br>대학 입시 결과<br>확인하러 가기</h2>
                <a href="#" class="cta-btn">결과 확인하기 <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></a>
            </div>
            <div class="cta-image"></div>
        </div>

    </div>

    <script>
        let currentIdx = 0;
        const sections = document.querySelectorAll('.page-section');
        const totalSections = sections.length;
        let isScrolling = false;

        window.addEventListener('wheel', (e) => {
            if (window.innerWidth <= 1024) return; 
            e.preventDefault();

            if (isScrolling) return;

            // 마우스 휠 감도(임계값) 체크
            if (Math.abs(e.deltaY) > 35) {
                if (e.deltaY > 0) {
                    if (currentIdx < totalSections - 1) {
                        currentIdx++;
                        updateSections();
                    }
                } else {
                    if (currentIdx > 0) {
                        currentIdx--;
                        updateSections();
                    }
                }
            }
        }, { passive: false });

        function updateSections() {
            isScrolling = true;

            if (currentIdx === 0) {
                // 1번 홈 화면으로 복귀 연출
                sections[0].style.opacity = '1';
                sections[0].style.transform = 'scale(1)';
                sections[1].style.transform = 'translateY(100vh)';
            } else if (currentIdx === 1) {
                // 2번 빨간 창이 묵직하게 위로 오버랩 연출
                sections[0].style.opacity = '0';
                sections[0].style.transform = 'scale(0.96)'; /* 은은하게 뒤로 멀어지는 시각 연출 */
                sections[1].style.transform = 'translateY(0)';
            }

            // 늘어난 트랜지션 타임(1.4초)에 맞추어 휠 인터럽트 중복 방지 타임락 세팅 (1400ms)
            setTimeout(() => {
                isScrolling = false;
            }, 1400);
        }

        function goToSection(idx) {
            if (isScrolling) return;
            currentIdx = idx;
            updateSections();
        }
    </script>

</body>
</html>
