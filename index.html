<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCS 글로벌선진학교 음성캠퍼스</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --gvcs-red: #9a1e23; /* 보내주신 시그니처 레드 색상 */
            --text-dark: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            /* 🔗 애플식 화면 고정 스냅 스크롤 핵심 속성 */
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #000; /* 전경이 흐려질 때 밑에 깔릴 블랙 베이스 */
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }

        /* --------------------------------------------------
           🖼️ 1. 보내주신 로고 이미지를 넣은 반투명 상단 바
        -------------------------------------------------- */
        .header-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background-color: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 9999; /* 최상단 레이어 고정 */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-logo {
            height: 40px; /* 로고 크기에 맞춤 */
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .header-logo img {
            height: 100%;
            width: auto;
            filter: brightness(0) invert(1); /* 어두운 바 위에서 잘 보이도록 화이트 필터 적용 */
        }

        .header-menu {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .header-menu a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .header-menu a:hover {
            color: white;
        }

        /* --------------------------------------------------
           🍏 2. 애플 스타일 스크롤 오버랩 & 스냅 레이아웃
        -------------------------------------------------- */
        
        /* 스크롤 섹션 공통 */
        .snap-section {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start; /* 스크롤할 때 착 멈추는 기준점 */
            scroll-snap-stop: always;
            position: relative;
        }

        /* [섹션 1] 고정되어 서서히 투명해지는 메인 전경 화면 */
        #hero-section {
            z-index: 1;
        }

        #hero {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            /* 🔗 보내주신 학교 전경 보정 이미지 적용 */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://raw.githubusercontent.com/gvcs-es/gvcs-es.github.io/main/GVCS%20%E1%84%8C%E1%85%A5%E1%86%AB%E1%84%80%E1%85%A7%E1%86%BC%20%E1%84%87%E1%85%A9%E1%84%8C%E1%85%A5%E1%86%BC.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: opacity, transform;
            transition: opacity 0.1s linear, transform 0.1s linear;
        }

        #hero h1 {
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            color: white;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* [섹션 2] 아래에서 위로 덮으며 완전히 올라오는 입시 결과 섹션 */
        #results-cta {
            z-index: 3; /* 1번 전경을 덮어야 하므로 더 높게 */
            background-color: var(--gvcs-red);
            color: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: 0 -30px 60px rgba(0, 0, 0, 0.4); /* 경계선 깊이감 */
        }

        .cta-content {
            padding: 100px 60px 100px 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .cta-content h2 {
            font-size: clamp(36px, 5vw, 64px);
            font-weight: 900;
            line-height: 1.25;
            letter-spacing: -2px;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        .cta-btn {
            display: inline-block;
            width: fit-content;
            padding: 22px 50px;
            background-color: white;
            color: var(--gvcs-red);
            text-decoration: none;
            font-weight: 700;
            font-size: 22px;
            border-radius: 0px; /* 완전한 정사각형 블록 */
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .cta-image {
            /* 🔗 우측 블록에도 보내주신 전경 보정 이미지를 은은하게 은폐 배합 */
            background: linear-gradient(rgba(154, 30, 35, 0.2), rgba(154, 30, 35, 0.2)),
                        url('https://raw.githubusercontent.com/gvcs-es/gvcs-es.github.io/main/GVCS%20%E1%84%8C%E1%85%A5%E1%86%AB%E1%84%80%E1%85%A7%E1%86%BC%20%E1%84%87%E1%85%A9%E1%84%8C%E1%85%A5%E1%86%BC.jpg') center/cover no-repeat;
        }

        /* [섹션 3] 하단 정보 공간 (스냅이 걸리도록 100vh로 조정) */
        #contact {
            z-index: 4;
            background-color: #111827;
            color: white;
            padding: 100px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        #contact h3 {
            font-size: 28px;
            font-weight: 900;
            color: var(--gvcs-red);
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 50px;
            width: 100%;
        }

        .contact-item h4 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #f3f4f6;
            letter-spacing: 1px;
        }

        .contact-item p {
            font-size: 16px;
            color: #9ca3af;
            font-weight: 300;
        }

        @media (max-width: 1024px) {
            html { scroll-snap-type: none; } /* 모바일은 스냅 해제하여 자연스럽게 */
            .snap-section { height: auto; min-height: 100vh; }
            #hero { position: relative; }
            #results-cta { grid-template-columns: 1fr; }
            .cta-content { padding: 80px 40px; text-align: center; align-items: center; }
            .cta-image { min-height: 300px; }
            #contact { padding: 60px 40px; }
        }
    </style>
</head>
<body>

    <header class="header-bar">
        <a href="#" class="header-logo">
            <img src="https://raw.githubusercontent.com/gvcs-es/gvcs-es.github.io/main/KakaoTalk_Image_2026-04-03-14-58-55_003.png" alt="GVCS Logo">
        </a>
        <ul class="header-menu">
            <li><a href="#hero-section">HOME</a></li>
            <li><a href="#results-cta">입시결과</a></li>
            <li><a href="#contact">CONTACT</a></li>
        </ul>
    </header>

    <div id="hero-section" class="snap-section">
        <div id="hero">
            <h1>GVCS EUMSEONG</h1>
        </div>
    </div>

    <section id="results-cta" class="snap-section">
        <div class="cta-content">
            <h2>글로벌선진학교<br>대학 입시 결과<br>확인하러 가기</h2>
            <a href="#" class="cta-btn">결과 확인하기 <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></a>
        </div>
        <div class="cta-image"></div>
    </section>

    <section id="contact" class="snap-section">
        <h3>CONTACT INFO</h3>
        <div class="contact-grid">
            <div class="contact-item">
                <h4>LOCATION</h4>
                <p>충청북도 음성군 원남면 원중로 406-9</p>
            </div>
            <div class="contact-item">
                <h4>PHONE</h4>
                <p>대표번호: 043-871-7000<br>입학문의: 1588-9147</p>
            </div>
            <div class="contact-item">
                <h4>ONLINE</h4>
                <p>admissions@gvcs-es.org<br>www.gvcs-es.org</p>
            </div>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', () => {
            const hero = document.getElementById('hero');
            const scrollY = window.scrollY;
            const viewportHeight = window.innerHeight;

            if (scrollY <= viewportHeight) {
                const progress = scrollY / viewportHeight;
                // 내려갈수록 더 완만하고 자연스럽게 투명해지도록 처리
                hero.style.opacity = 1 - (progress * 1.3); 
                hero.style.transform = `scale(${1 - (progress * 0.02)})`;
                hero.style.visibility = 'visible';
            } else {
                hero.style.opacity = 0;
                hero.style.visibility = 'hidden';
            }
        });
    </script>

</body>
</html>
